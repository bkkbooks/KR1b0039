body:
  text: 尚書疑義卷六明馬明衡撰無逸此篇詞㫖明白大約是兩段意思一則欲其戒逸豫以知小人之依一則欲其迪明哲以察小人之情皆先論其事理而引商周之君以明之也蓋人惟怠荒逸豫則縱欲敗徳智慮昏迷時常惕勵憂勤則清心養性旁燭無疆是二者亦未嘗不相因也所其二字大段古書多不可曉但得其大義足矣今蔡以為處所之所道理自好未敢信其為必然也先知稼穡之艱難乃逸所謂逸者非謂逸豫怠荒之云也蓋謂必由艱難乃可得其安耳如仰足以事父母俯足以畜妻子百室盈止婦子寧止此安之道也然非服四力穡何望有秋由是言之則古人終日乾乾夕惕若者乃所以為逸而何嘗敢一日怠荒宴安以為逸耶若謂艱難於始燕安於終是大亂之道也厥子乃不知稼穡之艱難乃逸為句諺鄙俗也誕放肆也君奭此篇序只云召公不說孔疏乃謂召公以周公嘗攝王政今復在臣位不宜其意不說史記燕世家云成王既幼周公攝政當國踐阼召公疑之作君奭此皆謬也孔說既攝政不宜復在臣位其失既逺史遷言當國踐阼尤非事實周公雖攝政何嘗當國踐阼耶且篇中小子同未在位則是成王親政以後事矣但周公之攝政成王尚幼大命新集周公不得不身任其責雖非當國踐阼然凡事皆聴於周公愚故曰伊尹之任商周公之任周後世大臣不得而例也其事異其跡疑但聖人之心明白至誠人皆可見以召公之大賢豈有不見於此故雖管蔡流言周公得以東征屹然不動至成王親政之後召公之意以為周公今日可休矣前日之不得已者今日可以得已也於此或未悉周公之意而自欲引退一以處已一以悟周公也觀周公明農之言非惟召公念之周公亦自念之矣但天命人心去留之幾此時猶未可放下故周公復留召公守經君子也大臣去就之義重周公達權聖人也宗國基業之念深盈滿之說豈足為周公道哉周公此篇危懼懇切之情溢於言外蓋以深喻召公大臣未可輕去之義固非専以明已志亦非專以留召公也嗚呼君至施於我冲子大約語氣今為引之嗚呼君者周公嘆息呼召公之辭也其意謂周家之事我二人不得辭其責從昔以來已曰是在我而已責既在我我亦不敢以安寧當上帝之命而不長兢業以念天威及我民遂自兹可以無尤違乎故夫天命人心之固亦惟在國家有輔翼之人又在我後嗣子孫有以承之而已使輔翼無人而後嗣子孫大不能恭敬於上下慢天虐民遏佚文武盛徳之光徙自處家室之中而不知天命之不易則天難諶乃墜厥命弗克經歴年所以嗣承前人恭敬之明徳也其在今予小子旦非克有所助也惟率循前人盛徳之光使不廢墜以施於冲子而已如是則庶幾不至遏佚前人之光而可以嗣恭明徳矣又曰天不可信至天不庸釋於文王受命亦足上迪前人光之意我道惟寧王徳延即繼之天不庸釋於文王受命下文申勸寧王之徳即云惟文王尚克修和我有夏文王與寧王恐只是一人則寧王當作文王古註孔氏亦將寧王作文王大誥諸篇皆然蔡氏作武王今詳於此以當作文王為是天惟純佑命承上文殷得大臣之助以徳配天而享國長久矣而天又純佑命之故凡商之内外大小之臣皆無不宣徳宣力以事其上此上所以從欲以治也秉徳在人乃言天佑命者人事亦天意也實字恐是語助辭蔡引孟子國不空虚為實鑿矣天壽平格至新造邦因上言天之保佑乎殷如此其至紂之承天一失其道遂至滅亡汝誠長念乎此則天位可固是宜共治明顯我新集之邦也而可決於去乎此言殷之事以告之也在昔上帝割至丕單稱徳則言周之所以得臣之助者如此殷周皆由得人而興此在今日周公不得不留召公所以未可去也凡周公所言皆不外殷周之事不暇逺引堯舜者堯舜世逺而事略殷周跡近而鍳切也小子同未在位當云不可以今日親政便欲退去宜同心共濟輔佐小子同於未在位之時也誕無我責收罔朂不及耉造徳不降數語如息齋之說亦通但亦只是以意為之說耳猷裕者寛裕之圖不為狹小廹隘之行也凡人有狷介之性者未免近乎廹隘而不寛召公旅獒召誥之辭皆是法度嚴𦂳不肯苟且一亳放過則其律已處事亦甚嚴矣故於此欲去者以義不可不去也周公之留已違其意奉身而退蓋亦甚決此所謂守經之法但道理甚大大臣之責亦甚重况王迺初年殷未引考其幾一失雖區區去就之義何補興喪之責周公之意獨拳拳召公有所不及此猷裕之言所以發也嗚呼持狷介之節者而或慮其近乎隘循寛裕之道者則又恐其失乎經大中不易之理惟反而求諸吾心而已然後世大臣之任其輕重視古有間其於去就之間未易以寛裕自委而使進退之義卒不得以自明也前人敷乃心一條則是推武王之意以留之也明勗偶王在亶為句謂汝當明勉以輔王在於盡其誠以乗載此大命也在於盡其誠則分毫意念之不周其誠有未盡也鞠躬盡力始終其事然後可謂之盡其誠也予惟曰襄我二人汝有合哉語意謂我之心有未信而若此告語乎予之所以汲汲不能自已者惟曰王業平定之責在我二人而惟汝之心與我為有合哉且人之言曰在我二人故今日天休滋至夫以天休之至為由於我二人則我二人其何以戡之其惟汝能敬徳明揚俊民布列庶位則人心永懐天命永固在乎推讓後人於大盛之時此所以為答滋至之天休也在時二人天休滋至與下文篤棐時二人我式克至於今日休意同註疏以二人為文武自不可通予觀周公之留召公既舉殷周之事又推武王付託之言又曰告汝朕允又曰予不允惟若兹誥又曰襄我二人汝有合哉又曰予不惠若兹多誥予惟用閔於天越民前後反覆不一而足其詞可謂切其情可謂哀矣又曰其汝克敬又曰其汝克敬典又曰惟乃知明徳則周公所以倚賴召公者深矣夫周公與召公共康輔王業最深且久當流言之變周公東征在外二公輔翊在内憂勤勞悴險阻艱難共嘗之矣太公既没所賴以相濟者獨召公耳於是而又去則老臣耆舊無人何以鎮定家國此周公之苦心誰則知之故夫人臣當國家之任欲其潔身不汚何足為難惟識足以慮天下之微才足以當天下之變量足以容天下之汚氣足以鎮天下之躁然後能成天下之事然後可以無愧於大臣之責斯為難耳或曰以召公之賢而不見於此何耶曰此聖賢之所以分也况周家之事亦有難言當武王之既喪周公秉政亦大出格非召公之賢則周公之心亦未易知迨成王既長後來基天永命久逺之圖則惟周公宗臣之心為更苦耳及是周公懇惻言之召公之心始悟召公惟見道理為定既悟之後遂以不去為是卒至留相康王永固基業此周公之功所以為大也蔡仲之命周公位冡宰正百工羣叔流言乃致辟管叔於商云云此史敘其事之由如此而先儒遂以為結正三叔之罪添揑巧說宋儒此等病痛最為害道然即其所敘云羣叔流言遂承云乃致辟則流言之時即已東征語意自明若如蔡註云流言只是冷語周公初避以俟察迨成王迎周公歸之後因其復叛方始東征則所謂東征者在三年之後非以流言之故而特以其叛耳史氏何不敘其叛而獨揭其流言耶夫自成王迎周公歸之後成王已知周公之勤勞流言至此復何為哉而周公復念其故而致辟之聖人所為固如是乎若以其復叛而亦流言也則流言之時固已即叛豈待優游三年之久然後叛叛然後致辟之耶其亦大非事情矣况經文本自明白今不即信明白無疑之經文而徒以己意揣度為是委曲之說是皆見於後世之事徒愛聖人之深而於聖人大道理未之敢自信也湯武之放伐微子之去箕子囚奴比干諫死彼其於大道理各有以自信耳伊尹周公苟非有大道理以自信如後世沾沾名義間則太甲成王不為商周令主其如商周何故周公之事不可以後世而論其位冡宰正百工者先儒皆以為在武王崩時而吳氏謂成王攝政亦是諒闇之時非以成王之幼而攝此皆惟恐汚染聖人而每事為之别白不知聖人正不如是亦反小了聖人矣夫諒闇之時百官總已乃通道也何足為異惟成王尚幼國家新造外難未除天命人心未固周公將委之何人耶故雖成王免喪即位之後主張國事猶是周公如東征致辟營洛微子封國多士多方之誥皆大事也其命雖出自成王其實皆由於周公觀頒朕不暇之言蓋可見矣及至成王親政之後始有不同以大胸襟觀之當此時居此任大道理自是如此但後世無此本領力量未易擬議耳今必苦苦為辨析將周公牢致古人科臼之中不使略寛一步恐聖人不如是也聖人未嘗出規矩之外亦未膠規矩之中惟視理何如耳伊尹百官總已以聴冡宰規矩之所有也使太甲居桐者豈規矩之所有哉周公位冡宰正百工規矩之所有也致辟管蔡任天下以待成王之長豈規矩之所有哉借使伊尹避放君之名商祀自太甲而殄周公避弑兄之名周業亦自成王而隳由今千百世之下以觀千百世之上為此乎為彼乎當知所決從也致辟之說有問文公是時可調䕶莫殺否文公答云他已叛只得殺如何調䕶得愚謂文公此語恐未是周公之心以已然之迹而論雖畢竟是殺然周公之心豈直如是而已哉其亦百般使人誘化曉諭不從乃殺之是亦何嘗無調䕶莫殺之意耶金縢云周公居東二年則罪人斯得不付之他人而周公自行不徃即殺至二年之久則中間有多少處置之事而古史皆不傳矣多方多士云昔朕來自奄子大降爾四國民命此復自奄歸則奄蓋數叛而亦屢征之也但篇次日月先後亦難定多士是洛邑之遷告之之辭是時成王方即政而云昔朕來自奄則未即政之前年方尚幼亦自徃伐奄耶若以大降爾四國民命為即周公東征之時殷管蔡霍之四國則成王未嘗親徃而稱朕者將為成王耶抑為周公耶抑或據周大總稱之耶今此云王來自奄至于宗周者則是成王即政之後矣然成王即政猶稱周公曰於王若曰之上是周公傳成王之命誥告天下可見周公留相王室未嘗離王而專徃治洛也蔡傳以誕保文武受命惟七年為周公身留治洛之七年而薨非矣書序雖不可信然亦大段須依之以千古之下而懸想千古之上非有所據事勢自難此書序亦不可少也奄之叛想是以商為辭故於篇内反覆言天命所以去商即周之故以見商之自絶而周非有意所以開諭多方也惟爾殷侯尹民語意謂我已不盡誅戮汝大降爾命爾無不知宜速悔禍自新可也乃於商奄復大圖天之命而不長敬念於祀使至誅滅豈不可哀哉不克終日勸於帝之迪者古人終日欽欽對越上帝所行無非天之道所謂帝之迪也今終日反是惟天不畀純乃惟以爾多方之義民蔡依古註純字屬上恐亦未然多士有惟天不畀惟帝不畀此不當有異但文侯之命有侵戎我國家純亦屬上句酒誥純其藝黍稷復屬下句如是則純字當缺之可也不集於享集如集義之集不集其所以享天之命蠲烝之烝如烝烝又之烝謂不能蠲潔以進於善道也惟聖罔念作狂惟狂克念作聖此語意極𦂳道理亦自足諸家只管以上智下愚不移來譬將古人𦂳切語意扯寛來比併論量大是害事夫人之所以為人者此心而已心之官則思思則得之克念者心之存也罔念者心之亡也使桀紂而克念則必戰兢自持豈不足以反而為聖乎所為下愚不移者惟不肯念而已罔可念聴謂罔肯克念而聴人之言也臣我監五祀謂臣服於周即是監非必遷洛之後而後為監也蔡以證遷商在作洛之前固矣爾罔不克臬當如古註云汝無不能用法欲其皆用法也予讀多士多方之誥周之安天下何其難也湯武皆應天順人之師皆以征伐得天下然成湯一革夏正之後天下晏然不聞略有反覆而成湯方且自以為慚徳矣武王伐殷之後反覆數見非得周公竭誠慰撫周之基業幾墜此周公所以不可去也商周之得天下同而安天下有難易不同若此者何耶豈夏之諸王不及商七王恩徳入人之深也抑或商亦有訓誥之書而今亡耶大抵聖人作用各别武王取商於天命人心之際夫何容言然此等精微道理在商之多士未必能盡知也武王㫁諸心而行之亦未必能盡信商多士之心也此其作用已自與成湯不同觀夫子謂武未盡善而不及湯又曰文王三分天下有其二以服事殷周之徳可謂至徳則其微意亦可見矣立政咸戒於王當如孔傳云周公用王所立政之事皆戒於王蔡氏以為率羣臣進戒恐不必然休兹孔傳蔡氏皆以為五者之官之美愚竊詳其義非也蓋成王方親政周公惟恐其以天位為可樂而忘其憂勤惕厲之心故上方戒以無逸而此復欲其處休而知恤也夫人能常憂其所當憂則其所以處心行事自有不敢苟者况人君以一身而當天下之責其所憂又有大焉者堯以不得舜為已憂舜以不得禹臯陶為已憂是故處逸豫之時而能知憂其所當憂其於立政任人又豈有不得其所而不用賢俊哉若只以休兹為美哉此官則其義淺矣籲者急呼之意有室大競是處休之時矣猶且急速招呼賢俊與共尊事上帝若不及而恐失之者是何嘗敢以休豫自處而忘其憂恤之心者哉周公吐哺握髮亦是籲俊之意其所用之俊皆迪知忱恂於九徳之行又不肯順適其君皆責難其君乃敢告教厥后曰拜手稽首后矣是欲戒其君而先致禮於君也宅者居而安之意宅字最佳循理則安從欲則危故曰仁人之安宅也夫人君處富貴之極易於不得其安而從危也故惟一循於理不入於欲則意氣清明好惡不偏有以審乎事理之當然而得夫中正之極致由是施之於立事施之於養人施之於正人無一而不得其所矣又安有三者之人不得其賢俊者乎是則所謂宅者必自天子克宅其心始以為端本澄源之地耶故曰宅乃事宅乃牧宅乃準兹惟后矣古人之言如此周公申之以為古人之於事於牧於準皆自其本源之地必求其安故入而謀於内出而相面於外皆用大訓其徳謂之訓徳者非徒口告語之也正是於本源之地必求其安以身率化之耳能大訓徳則於事於牧於準必得其俊而可以安人矣兹乃謂之三宅不惟知義者感化雖無義之民如商奄淮夷之數叛者亦可以化而安之矣周公之時所患在未化無義之民故成王親政舉以為言謀面用丕訓徳徳字承九徳之行來古之人臣有是九徳之實乃敢告戒厥后則其所以教者無非相訓以徳而其所謂三宅者何莫非徳之用而後得其安耶故曰謀面用丕訓徳則乃宅人面字即汝無面從之面謀面皆大訓徳則由中達外誠意交孚亦非面從後言矣聖人相戒勉意思大抵皆同宅乃事宅乃牧宅乃準此三事古今治天下之大綱領也三代官制雖各不同然實不出此三事而已此言事牧準未嘗指定官名蓋統體舉此三事亦不必以事即為常任牧即為常伯準即為準人也常伯常任準人固不出此三事但周家制度官名如下文更有許多亦何莫非此三事耶故此三事舉其總統道理而官制則隨時損益咸不出此三事之外也夫事者任事者也言任事則凡大小任事之臣皆舉之矣牧者養人者也言養人則凡大小養人之臣皆舉之矣準者正人者也言正人則凡大小正人之臣皆舉之矣夫天以天下付之人君人君以繼天立極而治天下使斯民皆得其養皆得其正皆得其事又豈復有他道哉特為人上者非有聰明之實不無好惡之偏所以於是三者多不能得其道理之安不得其道理之安則名為養民實以厲民名為正民實以淫民名為立事實以隳事是名為君而實不稱其為君矣此湯武應天順人其義在此而周公所以拳拳於成王者亦惟三事為至切也後世論治者許多煩文無補於事將聖人言語大略誦過其知三事為治天下之道者十有四五焉又知端本澄源宅乃三事者百無二三焉嗚呼尚何望其能復古人之治耶亦越成湯至用丕式見徳語意謂成湯升為天子大治理上帝之明命乃用三事有安遂能得其安謂三事有賢遂能得其賢是成湯於端本澄源之地無一毫好惡之偏故能盡用賢俊而三事皆得其安也又用威嚴使天下大法是道而天下諸侯皆能用三宅三俊於是教化大行其在商邑既大和恊其在四方用皆大法而明顯其徳矣大段三宅就人君身上說三俊就用得其才說中庸言取人以身况即下文而觀之非文王克厥宅心安能克俊有徳耶俊字承籲俊之俊來大抵治天下大綱惟在三事人君致謹於三事必求其安謂之三宅用人以治乎三事必得其才謂之三俊如孔註以三宅為服罪以三俊為明徳固夫之逺蔡註以位以才别宅俊而又以三俊為儲養待用者是益鑿矣周書如謀面等語本不可曉只當以大意㑹之蔡註字字生義而又以對仗為文是亦未免舉業之病也用三有宅至用丕式見徳語意謂成湯既伐桀乃三事而求其安遂能得闕克知三有宅心者三宅係本源之地克己為難故曰克灼見三有俊心者三俊須委任之才知人則哲故曰灼立政任人準夫牧作三事本言準人牧夫今此言準夫牧恐文有錯誤顛倒虎賁綴衣以下如蔡註所分以百庶以上為侍御之官以庶常吉士以上為都邑之官百司庶府即如周禮内府大府亦不可謂之侍御藝人太史庶常吉士亦不可謂之都邑之官司徒司馬司空亞旅又不可謂諸侯之官也愚意不如只依古註自虎賁以下歴舉官名不以官之尊卑為次蓋以從近而至逺虎賁綴衣趣馬最近王小尹左右擕僕百司庶府亦日與王接者大都小伯藝人表臣百司則略逺於王而官之略大者太史尹伯庶常吉士則官之掌事要與掌常事者司徒司馬司空亞旅則官之大者此皆略舉内外之官而又逺及夷狄也文王克厥宅心者其心一循乎理不從乎欲而皆居之安故於三事皆能得賢俊有徳者而任之也武王不敢替厥義徳者亦猶文王之克俊有徳也謀從者即洪範卿士從庶民從之類容徳即其如有容之類蓋言不係吝乎一已而克用乎衆賢也其克詰爾戎兵者兵有國所不可廢况當時徐戎淮夷之屬時時並興苟不能剪除統一安在其為嗣前人之業耶此周公所以終致意也通篇言三宅三俊勿用憸人此言戎兵似突然不相貫殊不知宅俊皆盡其道而後兵事亦無不舉而天下始可以無思不服若不能盡宅俊之道而徒訓於兵未有不禍敗天下者也克灼知厥若者既有審其事理之詳而又有以察夫人才之實則得真才治天下事此大順之道也故曰克灼知厥若稍有一毫私意間於其間則潜滋暗長必至舍理而從欲徇私以滅公於事理便眩而用人必偏是非大亂之萌乎然則所謂克灼知厥若者惟端本澄源可以識之周公之訓成王至此深矣夏之臣迪知忱恂於九徳之行乃敢告教厥后周公已受人之徽言乃咸告孺子王自古人臣未有不能善其身而可以善其君者也則克宅之既有以求其事理之安克由繹之又有以盡夫委曲之變皆不敢一毫有所苟也自篇首至以並受此丕丕基是舉夏商及周文王武王之事總論大道理全在三事得其安而用賢也嗚呼孺子王矣以下則專呼王以戒之使服行此道理而不失也庶獄庶慎勿用憸人又就中指出要𦂳事件以丁寧之所謂憂之深而言之切也耿光以徳言大烈以業言文王未有天下故言徳武王始代商故言業立言各有攸當也周官周官皆成王訓迪之言周禮則周家一代典章之書也周官惟三公三少及六年一朝之典與周禮不同宋儒遂疑周禮為周公未成之書然則周公亦若後世著書矣豈其然乎蓋周禮者周公之經制而其為書則儒者纂成之也一代八百年之久其制有沿有革而儒者之纂集有詳有略此其所以不同也且周官之書古文亦是晚出烏能以此而廢彼乎陳氏傅良謂周召以師保為冡宰是卿兼三公也顧命自同召太保奭以下皆卿也是時召公為保兼冡宰芮伯為司徒彤伯為宗伯畢公為司馬皆是以三公兼之衛侯康叔為司冦毛公為司空三公多是六卿兼官有其人則置無其人則止而六卿則不可缺也由是言之則三公三孤亦無專職此周禮所以不列於前然周禮射人司士朝士皆有公孤之位則與周官所敘亦未嘗不同或設置與否不定故不列其職而列其位歟君陳周公師保萬民舉天下而言也未嘗專以留後治洛為專職而經理訓誨之勤周公未嘗一日忘唯是殷民之懷徳向化則由於周公故命君陳以懋昭周公之訓至治馨香感於神明其意亦主化殷民而言亦猶禹謨云至諴感神矧兹有苗之意爾有嘉謀嘉猷則入告爾后於内數句自古註皆以為善則歸君誠非人君之所宜自言者竊以為君陳在洛為外王在鎬京為内成王欲君陳身雖在外而心常不忘在王左右故意念所及聞見所得有嘉謀嘉猷則以來告我於内既告於我爾乃順行之於外使人蒙其休者皆曰斯謀斯猷惟我后之徳則君用以顯矣如此說却覺差勝若如昌黎之說則洛邑去鎬京尚逺而曰入以告君出則不使人知似非命之出鎮之詞氣顧命康王之誥此與康王之誥今文合為一篇須是如此事體方備語脈亦相承奠麗陳教則肄肄不違諸家皆上肄字為句今細詳當肄肄連讀言漸摩教化積習而不違也思夫人自亂於威儀詩云抑抑威儀惟徳之隅人之有威有儀非以致飾於外也蓋以收斂肅恭曓慢邪氣無自而入而徳日益固矣紂之燕喪威儀至於滅亡則其所係豈小哉自狄設黼扆至側階凡有四節四坐為一節寶器為一節車輅為一節戈㦸儀衛為一節皆象成王平生所用而陳設之咸在路寢蓋成王之殯在寢西序欲就殯前傳命故設之王者之朝有三外朝一在雉門之外朝士所掌内朝二路門外之朝天子受贄見諸侯之所路門内之朝則與宗人圖嘉事者而黼扆之設想皆然也今因王崩於寢殯於寢故傳冊命於寢若見諸侯則當在路門外之朝也故康王受冊畢出在應門之内則是路門外之朝矣康王吉服受冊及朝諸侯受幣蘇氏以為非禮而諸儒咸以為未達禮之權至文公亦言天子諸侯之禮不同故孟子云諸侯之禮吾未之學所謂未學者禮之纎悉條貫也至於三年之喪齊衰之服飦粥之食此不待言者孟子固已明言之矣豈有方在五内分崩之時而從容衮冕之服其心豈能忍於是哉况在路門外見諸侯猶不見殯也而傳命在殯前則又甚矣蘇氏引禮經春秋傳為證愚謂反諸心而未安雖聖人之言猶當缺其疑而又何必援引證據之多耶如以為寶位相傳天下之大義則即以凶服行之何為不可夫吉凶之服不相為用較之父子死生之至情其輕重何如耶今必執凶服不可以行大事則是忽父子之至情而急觀聴之細故輕死生之大禮而重服色之微文亦舛甚矣說者又以為授受之際須要明白始足以服天下之心而定衆志又以謂周公之時尚有流言之變天下岌岌幾殆故於康王之立特為非常之禮秦漢而下授受暗昧禍天下國家不少夫秦漢而下貽禍國家者皆由於平時寵幸之失宜故流為臨時廢置之無度苟平時根本一定天下之人已曉然矣所謂朝委裘植遺腹不亂者而况有聖賢為之師保先王訓法具存至成王末年所謂世變風移四方無虞之時也亦何至張皇而特為非常之禮以臨之耶蓋所敘迎立之節陳設之儀自是朝廷規制當如是而非以為非常之禮也特服衮冕在殯前則是非常之禮耳今若不服衮冕只以凶服受冊迎立之節如常也陳設之儀如常也羣臣教戒如常也康王報誥如常也在朝見之天下聞之亦何涉曖昧不明之有哉豈明不明之所係只在凶服吉服之間耶而召公諸賢行之夫子錄之是皆不可曉者姑記以俟正葉氏少藴曰天子即位之禮後世無傳焉春秋猶有可考君薨世子嗣位於喪次殯而未葬葬而未踰年者不能踐其正位不敢朝廟不敢主祭封内三年稱子踰年而後朝廟改元春秋始書即位又曰諸侯踰年而朝廟即位以吉服乎以凶服乎不可知也愚謂天子諸侯之禮大抵略同春秋繼世之君無有以吉服受命於喪次者晉襄公有文公之喪西師來軼墨以即戎遂墨以葬記者記其禮之變謂晉於是乎始墨今康王之事不亦禮之變之極耶夫子既錄於經則周家後世必以為故事何列國之君又不然耶豈天子諸侯之禮亦自有所不同耶抑或在夫子之時天子居喪之禮禮經自備不患其不明至經秦火乃今無所考而夫子於此特以其終始之際成王有付託之勤康王有纂述之志諸臣有輔道之美亦足以為後世勸而不暇責其一事之失故亦錄之如吕刑秦誓取善於周公既没之後豈可責其純哉予觀世至周時人情變故大抵與唐虞之時不同故其所處之事亦異與後世緣人情而行之者多不甚相逺康王即位之事前後擺布如許齊整唐虞之時想無有也且堯舜之治天下以其一身公天地之間天下者公共之天下也堯舜之身天下公共之身也子足治天下則治之子不足以治天下則付之能者其心何嘗有一毫芥蒂耶何嘗以天下為己之基業而汲汲以保守而恐失之乎迨至周時積累勤勞以成基業如人家創業勤苦一般又兢兢保守恐一旦失之如人家守業艱難一般此其心之視天下與堯舜之心何如耶故一則曰丕丕基二則曰丕丕基則亦近乎後世之事矣堯舜之時恐亦不如是也愚嘗讀丕丕基之言而感嘆上古之事之不可及也後世世變既如是則其緣人情以行之者亦不能免也康王即位之事亦緣後世人情而行之者以周公之大聖不能必反堯舜之事召公雖賢亦安能兔於世變之人情耶不敢辭其僣妄敬附於此畢命周公克慎厥始君陳克和厥中惟公克成厥終於以見古人之為政從容不迫不急近功而惟求實效也夫當商命初革武庚繼誅殷之人士思殷甚切不無潛蓄憤悍之氣使即用寛和待之則難制即用旌别之則不堪故處之於洛監以其官訓戒之嚴不少假借如多士多方咸可概見所謂克慎也迨其既定不可太傷於峻急也當以寛和含容待之以導其歡欣樂易之心故曰克和及其既久不可太縱於慢弛也又當分别其善惡明白其勸懲以固其趨向蹈迪之誠故曰克成其三者誠不可已也由是言之周公開端之功固大而成王康王能任二公以成之亦可謂賢矣後世為政寛則遂至廢弛然有知振作以有為者憑其意氣之偏驅以刑辟之峻不量事體大逺人情民皆一時苟免趨避卒亦何益之有哉惟周公左右先王綏定厥家毖殷頑民遷於洛邑宻邇王室式化厥訓周公所以克慎厥始者如此何嘗專留在洛而為留後耶下文云邦之安危惟兹殷士周人致意於殷士者甚深故周公曲盡區處之方其用意之勤則有之聖人立於王朝之上將天下無不化服何待以身留洛地而區區為一方之巨鎮耶此等當以大體觀之不可以一字一句遂以為得其事迹而遷就其說也君牙冏命君牙冏命雖皆穆王時書然其間語言咸不悖乎聖賢之㫖文武周公之訓想皆當時仁人君子有得於學問者所為其有關於世教大矣故夫子錄之不以人廢言也暑雨祁寒小民怨咨蔡註以為兼養民之事若養民本無與於司徒則司徒掌教豈宜兼耶殊不知民事本司徒之事周禮知其夫家老幼廢疾與夫六畜車輦之數而教之稼穡其器物皆司徒之事也先儒以此為粗迹無與於教遂以為非司徒之文而不察其以民事為教之意而使司徒失其職者愚於周禮已深辨之矣今觀於此尤相脗合厥惟艱哉謂衣食不足至於怨咨則教行亦難矣民既怨咨而不率教則又未免有不率教之刑罰此民所以尤不得寧也故曰思其艱以圖其易民乃寧思之一言誠為人上者之要藥也細詳冏命之言恐須出穆王自說故能如此親切其病痛無不自知然後來躬自蹈之人心操舍之可畏如此吕刑吕刑一書諸儒皆以贖刑為非程子發䇿問謂聖人意在垂戒故錄之夫聖人若意在垂戒又不明言只根於經以與堯舜禹湯文武周公之訓並傳人將何得而知之朱子又謂穆王荒遊無度至晚年無錢使後撰出那般法來而蔡氏俱祖之此無他皆以穆王非有徳之君故雖有徳言不足取信於後世也愚反覆讀之愛其詞㫖懇切出於至誠惻怛之意而非以為掊斂之資也想穆王亦是濶大通達的人其天資亦高明故雖車轍馬跡遍於天下然後命君牙為司徒命伯冏為僕正其於道理亦皆見得特不勝其意欲之偏耳迨至末年精神鼔舞已盡返其初心有一念思及愛民之意見夫天下刑辟之濫而不忍之心油然而興故命吕侯斟酌為此法以訓四方如武帝南征北伐晚年精神既倦始有輪臺之悔使在夫子豈不取之况所宣明皆合古訓夫子亦安得而遺之哉夫聖人之書載道以為訓者也堯舜禹湯文武周公盡是道而無疵固備載之以為天下後世法舍此而下苟有合於是者亦併取焉以附夫堯舜禹湯文武周公之後是亦一事之堯舜禹湯文武周公也充其一事而事事皆如是焉是亦堯舜禹湯文武周公而已矣是則聖人載道以為訓亦聖人與人為善之心也或曰一事之合即可以為堯舜禹湯文武周公乎余曰長江之水浩蕩萬里何其大也沼沚之微去長江固已逺甚然不可謂非水也今取杯盂之水置之長江之中固無異也惟泥沙汨其性汚穢亂其真則始有異耳堯舜禹湯文武周公長江之水也其他有一言一事之合乎道猶之沼沚杯盂也雖其大小有間猶幸泥沙汚穢之不汨且亂不猶可以揚波而助瀾乎是故學者必有見乎是而後可以為學君子必有見乎是而後可以為教蓋不必務其大而惟求其同不可以一時區區之力而效長江浩蕩之無窮而惟孜孜汲汲於泥沙汚穢之不汨且亂也嗚呼是特可以論周穆王吕刑一事而已耶若贖刑之意亦未可甚病蓋刑獄一事極難非徳之至精者不能無疵於是說者謂虞廷之徳惟臯陶為盛故曰方祇厥敘方施象刑惟明舜之稱臯陶曰俾余從欲以治四方風動禹之稱臯陶曰邁種徳徳乃降黎民懷之則臯陶之徳誠非後世之所能及夫上有舜之聖下有臯陶之徳則盡夫天理之極而無人欲之私通天下之志而無不盡之情然後天下之刑可得而平也然猶有疑而宥者刑獄豈易言哉漢淳于意之女曰死者不可復生刑者不可復贖雖欲改過自新其道無由傷哉斯言亦天理之至人情之極也萬一有失其寃何如此文帝之除肉刑萬古不能再復亦未可遂以一筆勾㫁也蓋上古聖賢既已不作後世為君者喜怒好惡之横出而為臣者諛佞苟且之成風就中雖有一二忠實之質然亦所謂存十一於千百而其至精至粹之徳抑何得以言臯陶哉夫有堯舜臯陶之徳而行堯舜臯陶之刑可也徳不足以比堯舜臯陶而行之或少紓焉是亦未為失也與其殺不辜寧失不經吕刑之贖刑雖與舜流宥五刑少異者亦所謂失之不經而不至於大殺不辜也不亦可哉况詳其意亦所謂疑者贖之耳其不疑而麗於五刑者刑之固自若也安能以貨而倖脫哉而其曰審克曰閲實其罪曰中曰徳曰敬忌曰惟良曰哀敬不一而足其丁寧反覆深切之意藹然見於言外此穆王一念之善謂非聖人之心而與聖人同者歟若曰財匱民勞欲以斂財為事則其曰罰懲匪死人極於病即其所謂罰者亦恐其有虧枉而不敢苟也此豈汲汲於斂財者而能虚飾為是言哉大抵後世於聖賢未能見得實理實心而實知聖賢所以為聖賢者在此而不在彼或只就軀殻上看故即其人之心有一念一事可同於聖賢者不肯法其同以達其異必欲求其異以掩其同宋自二三大儒之外多有此病是皆未足以見聖人之心也夫子曰聖人吾不得而見之矣得見有恒者斯可矣夫子之心非知徳者孰能體之予常見今之司刑者恃其才智之雄或以一人之見而破數人之是非或以一日而剖決數十事若果肉刑吾將見肢體殘傷之人遍於天下矣文侯之命書錄文侯之命先儒皆謂平王忘不共戴天之讐而為戍許戍申之舉夫子錄之蓋以為戒其說誠有關於大體然欲以為戒而又錄其書以繼文武成康之後恐聖人之示人不如是之隱晦也然則夫子之意將何如乎春秋自平王而始豈夫子之取平王而猶作春秋耶曰玉之瑕瑜不相掩此玉之真也聖人取人美惡不相掩此聖人之真也文侯之命平王之初年也其志切其詞哀其稱述文武其仰賴賢俊一念之明宛然先王家法聖人猶有取焉春秋之作平王即位五十年矣乃不克有所為陵夷不競王澤遂斬聖人至是復何望乎故不得已而作春秋以寄王道自是則周始同於列國矣由是言之因其猶有可取而取之因其可絶而絶之聖人何心哉况東遷之初誥命首此一篇猶略存先王之典型而命自天子出此外杳然無聞矣其存亡進退之幾聖人得不深惜而大有所感也而又焉得而遺之耶愚讀文侯之命聖人致重於王澤者何如屬望於平王者何如於是益有以見聖人作春秋不得已之心也書上自堯典所以開帝王之統之始下至文侯之命所以紀帝王之統之終至於費誓秦誓有一事一念之合於帝王者亦皆錄之是亦思狂狷有恒之意此理在天為命在人所行則為道在帝王以維持紀綱天下則為統其被諸天下入乎人心則為風為澤堯舜之統不待言矣三代季世雖皆有昏亂之君然禹湯文武之紀綱未至改變天下之人心未至冺滅弑君弑父之賊猶未甚見所謂王風王澤猶尚維持布􅇴其統猶尚存也至是以後則王畿下同列國既無以紀綱乎天下而天下之人心亦已不知有先王之訓之遺而惟利欲之便於是魯桓弑隱公矣宋督弑與夷矣周鄭交質交惡矣所謂人化物而滅天理矣故夫子不得已而作春秋者所以紹帝王之統也而其始於魯隱者固維其時亦重因宗國而有感也是惟夫子可以當之故先儒謂夫子繼周而王不其然歟而夫子謂知我罪我是夫子亦有難於言者然則非真有見於帝王之統者未足以知夫子也先儒林氏謂周太史所藏典謨訓誥誓命之文至吕刑而止至幽厲簡編不接宣王中興㑹諸侯復境土任賢使能南征北伐錫命韓侯申伯用張仲山甫其間誥命必失亡於東遷之亂此論或然費誓秦誓二書夫子所以有取者費誓之誓師詞義正而紀律明與湯武之誓如出一體非若後世之用兵專以智巧戕害為事是可為後世用兵之法穆公之悔過誠意懇惻而所論用人足為至言非若文過飾非之比是可為後世補過之法王者吾不得而見之矣得見若是者斯可矣尚書疑義卷六

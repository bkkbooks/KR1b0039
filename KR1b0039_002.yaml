body:
  text: 尚書疑義卷二明馬明衡撰夏書禹貢禹貢一書是紀禹治水制貢賦之事當堯之前豈無貢賦之法至禹乃制之耶蓋洪水為災增損不一禹之治水將天下整頓一畨然大略亦必皆因其舊法而折中之耳非禹一自創為新法也隨山刋木奠髙山大川是一篇之綱領當浩浩懷山襄陵之時山不得為峙川不得為流而九州茫茫亦莫之辨治水之後若下文導山導水則山川各若其性而九州疆界亦因以辨所謂奠也然必隨山刋木者想上古之時民居宫室不至若是之繁斧斤稀少又經水患林木蓊薉擁遏水道水窒不行故必隨其水所經之山刋除其木然後水道通流不至於泛濫矣孟子所謂益烈山澤而焚之益佐禹即刋木之事也或疑古今同此天地同此山川何獨堯舜之世乃有洪水之災堯舜以前不可得而知矣即堯舜以後亦不聞有懷山襄陵之事何耶曰政有亦不可曉處或所謂懷山襄陵所謂滔天亦大略言之耳只是壞民種作民乃艱食聖人憂民之深惟恐一物不得其所豈忍視於艱食故汲汲思治朝夕不遑安而言之特切耳至其水患或亦如後世之河決當龍門未鑿之時河自積石北行不知亦如今南轉自龍門而過只是石峽緊窄故禹鑿使開濶令水不擁遏耶抑或自禹以前河從北去山後入海至堯舜禹時始徙來出龍門亦未可知也但自後世觀之河之徙凡幾變至今則由淮以入海一淮水獨受黃河之流則其變益遠矣以皇極經世之說推之今與禹同是午㑹歷世方六七千年則禹已前當有寅卯辰巳四㑹其歷世又何其遠耶然則水道之改易又安必其無耶若果如此則當夫龍門未闢奔悍四出為患何可勝言河水既新來則其他水道為河所衝决皆失其舊是以一槩泛濫禹既修治則併他水皆治之使各若其性然意惟治河用功為多也若如文公謂洪荒之世生民害多聖人迭興漸次除治至此尚未盡平則是以開闢以來如此意竊有疑姑録以俟正云朱子謂禹貢記地里治水曲折多不能曉如說始于壺口龍門不敢深信蓋謂當自下流始自下流則當自碣石九河始此意固是然余竊以為自下流始者此治水之大勢然上流亦有壅遏之甚者則亦必先達之此治水之權宜也况冀州帝都所在吕梁河之所急安得不先治之凡後世觀古人之事只當見其大綱至於因時從宜則去古益遠不可執一論也冀州梁岐注家以為雍州之梁岐蔡氏以為即吕梁狐岐之山皆冀州山也方以帝都為急故先治冀州然大勢當自下流始不應即往雍州則蔡說為得大抵觀禹貢在得其大體奠髙山大川此大體也欲奠其山川則必知天下山之始止知天下大川之源流然後順其性而治之乃能各止其所而無不定矣今天下山川大略論之有三條南海與江夾一條是為南條山也江與河夾一條是為中條山也河北自為一條是為北條山也江河水最大夾來山最長其中若濟若淮若漢若渭水皆短是其中山之分支處支既大故其水亦不小然則濟雖貫河自致于海其實是河北山之分支至河而盡也漢沔滄浪則中條向南之分支至大别而盡故其水亦至大别而入江也淮亦是中條南邊分支蓋分自桐柏山故其水出是山至海而盡故其水亦入海也瀍澗洛皆入于伊伊入于河是中條向北之分支至河而盡故其水亦入河也至若渭水則亦是中條向北之分支至河而盡故其水入河若涇沮漆則又是其間小分支至渭而盡故其水入渭耳若北條之山皆自北敵地面來其水不可得而詳然河之北更有混同江是河與混同江夾一條而混同江之北自為一條則亦是有四條矣凡此皆是大綱處聖人固未嘗如後世之論風水以求山脉然亦未有不知山之來歷而能治水者故於此等去處先要識得自然知有下手緩急自然因時制宜自中機㑹不必册中尋求一字之間以擬其數千百年施工之次第是亦難矣故余謂山名古今不同歷世考究已勤知其所可知而闕其所可疑可也夾石碣石入于河碣石之地古今論說已多然皆求之不得蔡氏祖酈道元韋昭諸儒之說以為今海中有山而多碣石者尚去岸五百里遂以九河之地淪入于海愚竊疑之夫以古今山川少有變動或不能無然豈有五百里之地俱淪入于海之理今因求碣石九河而不得遂以桑田變海之說通之是不若姑闕其疑之為愈也蓋黃河自周定王以來日漸徙而東南已非禹之故道則其初分為支流與貫入于河者悉皆易位矣又豈有遺跡獨存至今耶夫九河者以北播為九河之義推之則是黃河末梢之支流也既為末梢支流想亦不甚浩大漫渺然以大河之分故名為九耳黃河既改支流必枯變為平地理所必有今不信枯河之能為平地而獨信五百里平地之能為滄海是不信其變之小而信其變之大不信其理之所有而信其理之所無也此愚所以不能無疑也夫行海者有山可見則望山為準無山可見則望星為凖意碣石是河之入海自海達河所望以為凖者是固無妨於五百里之遠豈必逼近肱腋之下然後謂之右轉屈之間耶若是則入海中之山固可謂之竭石矣然下文導山至于碣石入于海則似碣石又在近岸之山是又有不可曉者豈禹之碣石尚在近岸古今名稱不同後人求之不得遂以海中之山當之耶抑或所謂至于者亦只望以為凖以志其入海之處耶然九河自漢以來求之甚詳雖不能悉得其處當亦得其二三其湮為平地者不可得而知而必亦求以足九河之數是則惑矣若其流為他河者則猶存其舊名或易為他名者漢得其三唐得其六宋歐陽氏得其一雖未必盡然要亦有的是者今不必通得其九若但真得其一亦可以證九河之非湮沒于海矣若此等類在理之大體固當缺之今亦録之以俟知者夾右碣石注疏以為循碣石之右鄭氏云山西曰右如此說亦覺穩帖朱文公謂冀都是天地中間好風水蓋以山脉自北而來前面三河環繞今觀冀都大勢固好然黃河既徙而南入淮則環繞之情亦異於昔矣若論天下之中當以豫州為正而形勢之雄固則猶在關中九河意鑿殺河勢者蓋河至末梢衆水所凑而又大陸四平無名山以為之限若不以分疏數道而行必是衝决無常為民之害故云北播為九河播者亦是人力分疏之義也同為逆河者至海則不患其衝决矣既是人力所鑿則非若天地生成者古今長存而不變也况大河既徙則此等之河必致湮塞千萬世而下必欲求其一定之跡而必足九者之數其亦未達於道之儒乎徐州浮于淮泗逹于河以淮逹泗泗逹濟濟逹河也酈道元謂禹塞淫水於滎陽下引河東南以通淮泗濟水分河東南流則是自禹時已分一𣲖與淮泗通矣三江其說多不同今恐只作松江分流者為是蓋震澤之底定由三江之既入也三江不由正道而入于海則其漫流泛溢震澤何以能定耶况味其文法如彭蠡既豬則陽鳥攸居大野既豬則東原底平也是皆不可說太遠以岷山之江為中江嶓冡之江為北江豫章之江為南江則與震澤何干耶有貢有篚又有包者皆貢也但其物有可以直貢者有可以篚貢者有可以包貢者又必其地之所有則貢非其地之産則不貢故梁雍不言篚自揚荊之外不言包也滎波既豬鄭康成謂滎今塞為平地在禹之時政必不然蓋禹之治水不過順其天地自然之性而已大段地之峙者為山平者為原水之流者為川豬者為澤禹則山還其峙原還其平川還其流澤還其豬而已今觀九州所敘不出四者此禹貢之大綱領也故曰四隩既宅九山刋旅九川滌源九澤既陂若夲是澤塞為平地豈禹所謂順水之性哉導山之說先儒論之不一或以味别地脉為疑愚意世論地脉者為求葬地逆天理規福利與聖人萬物一體之意不同若味别則尤無謂然治水不求地脉如何治得夫兩山夾一水兩水夾一山此理之不可易者故水必因山而比山必隨水而行今觀導山之意禹之所謂行其所無事者正在於此蓋皆因山川自然之勢而為之導耳當洪水浩浩懷山襄陵之時山脉實不可知鑿於智者不求山脉之自然自作聰明隨意開鑿人力所施幾何此處雖鑿得低彼處又髙水終流不去於是或決此水合彼水或妄為堤防以障塞容受不得依舊泛溢是皆不得山水大情之所致也鯀之九載績用弗成未必不由於此禹之胸中先洞見天地自然之脉絡而必求山川自然之勢以治之髙者還其為髙低者還其為低流者還其為流止者還其為止禹未嘗自作聰明而有所矯揉也故夫偶有阻塞水窒不行或林木以為之障或土石以為之梗而其自然之勢固在也故隨山隨水去其阻塞而自然之勢自見水安得不通流耶然其所導之山皆舉沿河一帶不專在脊脉上經行蓋大脊雖如是而行自大脊上分至河又有小支支間又有小水也故所在沿河一帶之山而其大脊即在矣導山導水亦是一齊事非先導山畢而後導水决無是理但形諸文字不得不分山水而各自為導也且亦以見山止水之源流也岍岐荆山在河之東實為河以南之山壺口雷首大嶽底柱析城王屋大行恆山則皆是逾河以北之山也禹之治水固隨其山脉之自然然亦必河之所經或其山之水入于河者則隨而導之若其山至此而盡曠為平野而餘支又往他處非大河所經而其支之水不入河者亦不之及今觀至于荆山乃逾于河則是岍岐一帶至荆山而盡而河北壺口以下諸山皆自北地生來如蔡氏傳注之說而其龍門石峽逼窄則是兩邊山腳相至交牙今山間兩山之腳交牙生石者往往有之如是則岍岐荆山自為一條而逾河壺口雷首諸山又自為一條也蔡氏謂一支為壺口大嶽一支南出為析城王屋而又西折以為雷首又一支為大行一支為恆山其間各隔泌潞諸川其說固是然總而言之皆河北一大𣲖同幹異枝也但禹所施工在於沿河一帶故只舉沿河一帶之山以至于海不在大脊上言也此以河界斷言之然山脉之生亦不可知所謂石骨過山河者往往而有之又安知非荆山之脉連接壺口而河流穿破其間耶此皆不可得而詳也而荆山之脉至此而盡則河北諸山後面當有分脊處當如蔡氏之說脊以西之水西流入龍門西河之上流脊以東之水東流而為桑乾幽冀以入于海矣是兩水夾一山也然如李復之說禹鑿龍門起於唐張仁願所築東受降城之東自北而南至同州安國嶺而盡兩岸石壁峭立大河盤束於石峽間千數百里不應山腳交牙如是之遠則又疑為石脉相連而為大河穿破又疑為大禹以前河從東北道而此為新徙亦未可知也凡此皆難以證據姑以意度理㑹用偹一說以俟參訂云岍岐荆山大槩在渭之西北河之東南是渭與河夾出一支也蔡氏通以岍岐荆山為大河北境之山非是西傾朱圉鳥鼠至于太華熊耳外方桐柏至于陪尾此河南江漢之北一條大山河與江漢兩水夾一山也河之南又有渭渭源短漢源亦短惟江河源長故總其大綱則以江對河而夾之洛水伊水瀍澗之水皆是大華一條邐迤而東其山麓分𣲖而中夾小水也又邐迤而東南至桐柏又分淮南淮北一條正起為泰山而分出汶水北流入濟沂泗南流入淮皆是江河中條一大支末稍分𣲖處若論山脉盡處此中條當盡於太山而北止於陪尾者以治水所經止於此也導嶓冡至于荆山內方至于大别此為江北漢南之山一條短支蓋南是江北是漢兩水夾一山至大别而盡也其山之原當與終南太華同幹異枝疑皆是西傾朱圉而分也何以知之蓋終南大華以南山麓之水入漢沔嶓冡荆山以北山麓之水亦入漢沔漢沔之源出於嶓冡山則山亦於是而分也此是河以南江以北中條一大支分為二支也蔡氏通以為江漢北境之山恐未是謂江之北則可謂漢之北則不可但地圖荆山內方在漢南大别則漢北此必是誤當再考史記正義云大别山今沙州在漢上漢水經其左若在漢北則不得云經其左矣又左傳吳與楚戰濟漢而陳自小别至于大别則大别亦當在漢南矣岷山之陽至于衡山過九江至于敷淺原此是南條江以南之山江與南邊海兩水夾一山也其間分支擘𣲖甚多而又有小水出於其間衡山與敷淺原雖如蔡氏之說然總而言之同幹異枝也蔡氏以此為南條江漢北境之山者非是弱水西流黑水入南海西流則亦南海矣大抵山自西北生來為中國諸山積石西傾岷山皆自西畨裏面而分是皆同幹異枝也河源之所始河南北之山所由分也而江源之所始江南北之山所由分也其未分時則皆共一岡脊而已蔡氏所謂岡脊以東北之水既入于河漢岷江其岡脊西南之水則皆入于南海此最為得之然則弱水黑水皆未分岷山幹上向南山麓之水也此其水想不甚為中國害但禹既治水將天下經理一畨弱水黑水皆九州封域所至故亦書之朱子所謂只是分遣官屬去理或相視其地歸來具規條以復由是言之九州山水截然整齊者亦記載文字不得不然耳按元史世祖至元十七年遣使窮河源招討使都實受命行四閲月始至其地大抵言河出吐蕃朵甘斯西鄙有泉百餘泓方可七八十里沮洳散渙不可逼視登高望之如列星然名鄂端諾爾即華言星宿海也羣流奔輳近五七里匯為二巨澤名鄂楞諾爾自西而東連屬成川號齊必勒河又合伊爾齊呼蘭伊拉齊三河其流寖大始名黃河又岐為八九股行二十日至大雪山名騰格哩哈達即崑崙也由崑崙南至庫濟及克特二地始相屬又經哈喇伯勒齊爾之地合細黃河及克埒穆爾齊二水北行復折而西流過崑崙北又轉而東北行約二十餘日至積石始入中國約自河發源至中國計及萬里云由是觀之世言黃河發源崑崙非也蓋宋以前不能及遠至元來諸國皆屬使節始通所窮當得其實自河源二十日至崑崙自崑崙二十日方至積石是崑崙亦黃河所經之山然其經行之遠衆流合湊其源非一不知紀極然云由崑崙南復折而西流過崑崙北又轉而東北則是崑崙者亦河北之山而西傾岷山又非崑崙之𣲖矣世言中國之山皆生自崑崙者又不然矣然此皆荒遠難窮略之可也導河積石至于龍門自南行轉而東自東行轉而北以入于海則是禹時河自北入海未嘗東南流也然徐州之貢浮于淮泗達于河則淮泗與河通矣水道既通河安得不因之而東南注乎蔡氏引許慎之說謂汳水受陳留浚儀隂溝至蒙為灉水東入于泗又謂泗受泲水東入淮蓋以灉水自河出而泲亦可以通河故浮于淮泗可以達于河如是則自禹之時河已分入淮矣而導河之文又略無所見分入淮之意何耶豈灉與泲水雖可以達於河然地有髙下河未嘗因之東南流耶所謂入于河溢為滎者猶是濟水而未嘗以為河之支流也酈道元復謂禹塞淫水於滎陽下引河東南以通淮泗濟水分河東南流亦不知其何所考也方氏回謂建紹後黃河決入巨野溢于泗以入于淮者謂之南清河由汶合濟至滄州以入于海者謂之北清河是時淮僅受河之半金之亡也河自開封北衛州决而入渦河以入淮一淮獨受大黃河之全以輸之海此則今之河也東匯澤為彭蠡文公之辨不一而足以為彭蠡之澤無所仰於江漢之滙而後成其說甚長文公仕官南康軍身所經歷之地自是實事但愚竊詳之中江北江之說則有難通若東滙澤為彭蠡亦自無害何可遂以為衍語耶蓋文公於東字滙字為字看得太重故以其言滙為彭蠡若必仰於江漢而後成者為不通也其論說之富排闢之嚴至於如此若今平平讀之則若云再過東去滙彭蠡之澤以入于海亦未嘗有不通也漢雖江北然視彭蠡則為西彭蠡雖江南然視漢則誠為東耳相去七百餘里而云東滙是豈有不通耶夫漢去彭蠡雖遠而彭蠡之澤誠不可謂自漢而㑹者然已云南入于江則其滙者江之水也且番陽合諸州之水雖衆然較之大江之水所從合而凑積者其大小盛衰氣勢相去遠甚江水大則亦必入彭蠡及其大江入海勢迅則彭蠡之水始出而與江水同趨于海矣然則所謂滙者又何嘗有不通耶又凡所謂澤者以水之鍾而得名也澤之所由鍾者必有資於關欄壅遏而後成也今彭蠡之水雖不仰於大江然非有大江之水關欄壅遏於外則必亦直出决迅而去安能回顧汪洋灌注瀰漫以成數十百里之巨浸乎是亦未嘗不仰於大江而其所謂為者又無有不通者矣或曰文公固云湖口橫渡之處但見舟北為大江之濁流舟南為彭蠡之清漲則是江水固未嘗入湖也豫曰此特以一時所見而言之耳夫水之相入相㑹當看水勢之大小為盛衰若今南方溪海相㑹若溪大海小則溪囓海鹹水不能入雖潮汐擁上而溪流自回環而為江若溪小海大則海吞溪而溪水皆變為鹹水矣此必然之勢也今大江之與彭蠡其大小之勢不待智者而知顧大江東去直流為平緩而彭蠡南來橫衝為迅急緩急之勢江水讓焉濁流清漲固有時而分也然雨旱各以其方或彭蠡所仰於諸州者雨旱不時又烏能與大江敵乎况冬月水涸彭蠡之漲抑何所資乎由是言之則大江入彭蠡者十七而彭蠡入大江者十三也濁流清漲何足以限之耶且經所謂東滙東為中江北江者亦只言自西之東耳而何嘗於入江之後又特分别一半為漢水一半為江水一先一後而入彭蠡而其出也又一為北江一為中江以入海耶是雖甚愚者不為是見而謂聖經有是耶是皆牽泥文義之過也惟中江北江之說今誠無之不知禹時水道入海竟何如哉或中北字必有闕誤今亦不敢强為之說也文公云荆陽地偏水急不待疏鑿當時只是分遣官屬去未嘗親往以此致誤但禹㑹諸侯於㑹稽則已渡江而南矣中江北江之說是豈有不知耶此又是不可曉處禹之五服只五千里周倍之為萬里而漢亦約以萬里先儒皆疑禹服之狹而周漢地廣愚竊以為周之九畿自蠻服而下已是五服之外周朝覲之制止於五服所謂六年五服一朝是也九州之制止於蠻服而文教之行亦止於蠻服所謂六服羣辟罔不承德是也若夷鎮藩三服總號蕃國大行人所謂九州之外謂之藩國世一見是也大段周之制以五服為正所謂蠻者縻也亦是縻之而已又王制西不盡流沙南不盡衡山東不盡東海北不盡恆山是周之九畿雖逺而其疆理之地亦與禹服相同禹之五服雖近而其東漸西被聲教所及亦與周不異蓋聖人君理天下務在安民不在廣土聖人之心未嘗以天下為己私有而欲富天下也兢兢業業惟恐不足以稱作民父母之責而天下之民不得其所故已之所治者既安而其聲教之覃敷遠者亦自然向化如天之賦物各止其所斯已矣曷嘗欲使荒遠之地皆為吾有而富天下哉堯舜三王皆是心也後世秦皇漢武始以拓土開疆為事而其心與聖人公私頓異蓋不可同年而語也卒使兵革不休疲民以逞所得不足補其所失秦遂以亡漢亦虛耗亦何益哉而蔡氏以周與漢皆盡其地之所至而疆畫之竊恐未然我朝近歲用言者欲征交趾郡縣其他好事者奮勇爭先而殊無折衝之具止之者宴安自便又不聞其有安民之圖愚以此說示諸人皆笑以為迂濶此無他學廢不明皆不能得聖人之心故也嗚乎心之公私毫釐千里今人誰復辨之卒而耗費一畨竟亦無補然則謀國者舍堯舜其君之心亦何以事君而治天下哉甘誓觀甘誓之言可以見啓能敬承繼禹之道矣說者以為啓雖承禹傳道之後而干戈行陳之事亦曽從學家素講明來又以為禹固不以天下為無事而不訓以兵啓亦不以天下為無事而不習於兵此皆不知本原之論也倡平居習兵之說為害不小聖人豈如是哉蓋聖人之治天下固自有體觀周禮大司馬春搜夏苗秋獮冬狩之法皆非無事習兵而習兵之法未嘗不在此有國之大體也啓既能敬承繼禹之道大體豈有不知豈待拳拳於家庭而專以講習兵革為事哉此說愚懼其失而貽害也故為論之三正蔡依馬說子丑寅三正故以為夏前三正迭用今詳五行三正皆是切於民事者而有扈全不著意且有箋害民無所措手足故征之如是則三正只依孔注作天地人之正道亦是皆金木水火土民生之所急天地人之正道則民不可一日離也五子之歌𦙍征甘誓五子之歌𦙍征夫子録之者啓能纘承父道大康雖尸位猶賴有厥弟少康之賢蓋以見聖人之業幸有所托而諸人者亦能不墜厥緒為世道生民之幸為萬世人君之大監也聖人之意淵矣然少康能復禹之績季杼亦能戡定寒氏之亂意當時告戒辭命當必有可録者而今不復見安知非在百篇之中而亡之耶尚書疑義卷二

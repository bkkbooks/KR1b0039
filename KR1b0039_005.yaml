body:
  text: 尚書疑義卷五明馬明衡撰金縢金縢之書大有難曉周公代武王之死此事終有可疑而又言其多材多藝能事鬼神自是鬼話後世相傳皆以為周公至誠惻怛欲輸危急余反之於心終有所未安也又以冊書納之金縢之中王他日啓而得之似若預為已地者又二公亦且不知至問諸史與百執事則皆曰信又云勿敢言周公至誠懇惻之事不係宣泄機密利害又何不敢言之有即非周公命之不言而火與百執事之不言亦又何故乎且聖人舉事自是光明俊偉為武王而請所宜請也則周公自明白為之何至深密必使人皆不知而惟己獨知以為異者今觀其間諸史與百執事其當時之人亦云衆矣周公何嘗欲深密令無人知以為異耶乃云不敢言雖二公亦怪問然後得之何耶凡此皆反之於心有未安者故未敢苟信今皆以為聖人之事夫子所定之書反覆委曲以求其解不知夫子當時所定果如是否然武成之書孟子亦疑之在孟子之時亦木經秦火豈非夫子之所定耶余姑缺之以俟知者我之弗辟辟字蔡音避以為周公遭流言成王疑之故避居東都以俟成王之察古注作法字說謂致辟三叔先儒亦多從之愚竊以為避居之說只可以語後世之為臣者豈可以語周公周公所當之任在後世不可同日語周公焉得逡巡而避之以俟察耶當時管叔已叛淮夷徐奄之屬皆已附祿父而起非但流言而已也使非周公制叛則叛者必制周公矣周公又可空手避居以坐待其斃耶故致辟之說在周公自不可已先儒謂豈應以斤言半語便興師以征之聖人氣象不如是此皆懸想氣象之言也或曰成王既疑安所請命周公將自誅之耶且身既在外權已去矣王疑不悟讒間日深如後世之事身尚不保又欲從容察其罪人而辟之耶曰聖人聰明睿智豈有作事若是之愚夫使權柄一失不保其身則周家之業必墜聖人豈無所見於是而漫然以為之耶蓋當是時成王尚幼陳氏梅叟謂武王有疾之年是克商之二年成王生才五年比武王之喪則成王方十歲耳通鑑纂要以為成王即位時十三歲此皆不可刻畫大約言孺子則是幼稚未成人之稱成王當時尚亦未能省事而國家政柄全是周公主持二公輔之周公以人臣而代行天子之事伊尹之任商周公之任周皆非後世人臣之所得比由此言之周之基業非得周公何能定乎故成王後來賜魯以天子禮樂蓋亦念此矣管蔡流言正以其跡之近似亦易使人信聖人之作用人亦豈能盡知况又有殷民之遺有武庚為之主又有王室至親為之嚮道此間不容髮之時天下安危之所由分而天下之柄又既在於已周公安得崇虛避之名而辭其責耶世皆言成王重疑周公成王方在冲年未省事豈遽能知疑周公者考之於經前後亦不見成王大疑周公之意如歸禾佳禾書序之言尤足以見成王之未嘗疑也惟為二叔所惑者或未能知周公忠誠之心二公豈不知耶在朝之多士豈不知耶以聖人盛德其孚於人亦非一日矣故周公得以居東而所謂誅管蔡者又安有不得請命者哉又安有大權一失不保其身者哉然則誅管蔡者即居東之時詩東山自我不見於今三年者蓋罪人斯得之後又一年耳朱子謂殺武庚致辟管叔於商囚蔡叔於郭鄰降霍叔為庶人命微子啓代殷後皆此時事又云周公乃告二公曰至告我先王作大誥遂東征得其實矣若云成王既迎周公歸之後方更命周公誅管蔡則是周公二次往東山矣夫周公惟其主少國疑大難將起故不得已權其輕重而誅管蔡若成王既長君臣既皆相洽流言外侮何足忌而獨不能委曲處置容一至親耶故誅管蔡之事決非迎歸之後此不可不明辨又云成王重疑周公若周公無所自容者愚敢以為皆非也曰於後周公作詩以貽王豈非亦因其疑而欲開其惑耶曰周公居東既久成王漸長親政既未知周公之勤勞王家豈能無間隔之意故周公作詩以貽亦因王知識漸長使歌咏而自得之但成王天資亦高容易開悟又以周公盛德二公贊翼即非雷風之變亦必迎周公矣故周公東征後來事體皆已瞭然胸中非幸而成者其曰盡其忠誠成敗利鈍不能逆覩者又不可以言周公矣曰如子之說以成王尚幼未疑周公故周公得以遂其東征之舉若成王既長亦遭流言之變而重疑之不知周公何以處之曰事亦難以逆料但聖人至誠動物若成王既長自知周公矣萬一昏愚之甚如紂者然後微子箕子之徒始為不得已之計耳然至此極者甚少聖人力量自是感格不同我無以告我先王者謂我若不辟罪人而得之則恐終為搖惑致危王室先王其謂我何蔡說恐未見下落意思然居東二年之久乃得罪人以聖人之兵豈不能即克之耶遲回至於二年則其初豈有誅之之意中間無限委曲開諭化誨之不悛故卒不得已而誅之耳於是尤見聖人天性之至情而春秋鄭伯克段於鄢之書與此正相反矣王肅謂管蔡與商奄共叛故周公東征鎮撫之案驗其事二年之間罪人皆得者亦是大誥此篇蓋周公東征以誅叛之義告天下也其云殷小腆誕敢紀其敘曰豫復反鄙我周邦則武庚巳叛難已作矣周之致討自不容緩而成王尚幼周公其將委之何人乎而又豈容空手避居東都三年之久直至迎歸之後乃奉王命以徂征則其叛者將不四出滋蔓而三年之內將何以待之耶蓋金縢所謂流言於國者非只是流言也古史記事文不必具自是如此後儒不能深考其義而謂以片言即興師以誅之為非聖人氣象將天來大事看作閒言語嗚呼豈有此等言語可作等閒看了蓋不利孺子一言是搆禍發難題目兵出無名事固不成後世起兵舉事皆要提一大題目以聲其罪以為名耳管蔡發端如此即周公不為一身禍福之計不將為天下安危計耶故謂迎歸以後方始東征者考之於此其不可通益顯然矣大誥東征周公之舉成王尚幼而皆稱王言者可見周公自武王崩雖有攝政而其正名出令未嘗不以成王為主此於義理事體甚正亦何可疑特管叔造流言以為名耳周公之征非避流言致討其叛也既造流言必不得不叛既已叛必不得不致討也洪惟字亦是古話頭多如此如泰誓洪惟作威亦同蔡以惟字訓思謂大思我幼冲人書中言惟者多如云惟皇上帝惟其克相上帝等類不計其數何獨此専訓思耶矧曰其有能格知天命蓋下文將言不敢閉天威用及大龜紹天明故先謙言亦以見非己一人之私意也語氣謂豫實不知天命但豫小子夙夜危懼若涉淵水惟求所濟實欲敷陳增光前人受命於此不忘其大功然則武庚今日倡亂天實誅之子不敢閉於天降威用也寧王遺我大寶龜至越兹蠢此言即命於龜曰有大艱於西土今西土亦不得安寧於此蠢然而警動也蠢者無知而警動不安之意此篇兹蠢今蠢并允蠢鰥寡三蠢字皆是百姓驚動非謂武庚蠢蠢而動蓋四國作難百姓自然驚動不安殷小腆至周邦聲武庚之罪今蠢至并吉言得人心之應而卜兆之吉以見皆天意所當征也但今蠢今翼日雖依蔡傳今解終有難曉肆豫告我友邦君至不違卜承上謂殷罪如此人心卜兆如此故告汝以伐殷而汝不可也其言曰艱大民不靜推原其故亦惟至親倡誘之故於此謂豫小子當考正而安定之不可即往征之也卜雖得吉王何不違卜而勿征乎蓋友邦君諸人之意以為作亂者是管叔為王室之至親非他人比是可以恩意呼之使來可以不煩兵力而定此意固好然不知其不能而怠緩玩冦時不可失也厥後周公亦至二年而罪人斯得豈無是意行於其間哉上言有大艱於西土西土人亦不靜故此云艱大民不靜正以應上文也肆豫冲人永思艱至乃寧考圖功承上言汝意欲違卜如此是以我亦長思此大難非不思而妄為也思之則尤見痛切於身曰信驚動此鰥寡之人為可哀也豫之所役乃天役也蓋天遺大事投大艱於我之身我於是不能自恤矣汝當勸勉我也義爾猶言汝等皆義也已豫惟小子至丕丕基言天意見於卜決當從卜以東征也王曰凡四每王曰為一節皆更端以告之以盡其義也寧王舊注作文王蔡傳作武王然意以安寧天下故稱寧耳爾惟舊人至攸受休畢亦作三節皆稱天稱寧王寧人以見承天意紿祖業在此舉也天棐忱辭其考我民者謂天輔我有誠信之辭其以成我民也忱辭化誘邦君之辭也王曰若昔朕其逝至其勸弗救則皆喻其當紹祖父之基業以伐殷也嗚呼肆哉至末復反覆歸於天命而見於卜決意東征也周公將東征而告諭天下勤懇切至如此蓋亦伸大義於天下以曉示人心然後從而征之聖人舉事豈是草草一聞謗言遂避居以待主上之察耶此章誥語多主卜者蔡以邦君御事欲王違卜故以卜吉之義與天命人事之不可違者反覆告諭之竊意以古人作事動歸於天而已未嘗有一毫私意也卜者所以紹天之明龜筮既從天命之矣卜與天命非有二也故此篇拳拳於卜者正在敬承天命以從事非徒以卜而解諸人之惑也又朱子謂周公在當時外有武庚管蔡之叛內有成王之疑天下岌岌然此誥當以聳動天下今乃意思緩而不切殊不可曉愚竊以為此正周公所以為周公也學者未有聖人之根本安識聖人之氣象聖人遇事正不如是周章今人處些小事便自狂奔盡氣欲求聳動乎人便是伯術用事聖人只平平說去誠意自至且亦足以見當時成王未嘗大疑周公也微子之命書序云成王既黜殷命殺武庚命微子啓代殷後作微子之命其傳云啓知紂必亡而奔周命為宋公為湯後古今皆云微子抱祭器歸周至云面縳之事如左傳史記所言豫前已辨之矣今觀是命是即殺武庚之後成王封之武王未嘗封之也而諸傳引樂記之言云武王克商既下車投殷之後於宋謂武王已封宋但未為殷後今因武庚之黜始為湯後蓋只申命之非至此始封之也愚竊以為微子若封於武王之時則當時封命之辭何無所見不特其辭無所見即其已亡之序亦無所見也說者又以為既封箕子於朝鮮豈有不封微子之理嗚呼箕子之封又將何所見乎是并其引證者尚非也而况於其本然之事實乎箕子於朝鮮亦已有論於前而此云微子之命者不改其舊爵之名也不改其舊爵之名是微子前此未嘗封也箕子亦始終只稱為箕子是箕子亦未嘗封也武王訪道尊賢豈不欲封之意必二人不受武王不得而封之也夫國破君亡不肯為臣僕宗臣之義在微子者猶其在箕子也微子懼宗祀之無所託故去之而遁於野其心豈得已乎此時宗祀為重君為輕故雖流離荒落之中而先王祀事不泯精神有所棲斯已矣若必以爵祿為榮非其志也既而武王封紂子武庚微子之心可以少釋使武庚能賢克紹厥猷一王典章不至淪沒微子又何求乎不幸武庚又敗則續其緒者非微子而何蓋去就輕重之義於是亦可以出矣故微子之就封其義有二一以存聖人之宗祀一以備一代之典章是微子之封由武庚之敗也其封命始於此也非申命之云也武庚不敗則微子決不就封豈有宗國方沒宗廟播遷人事變易之形方在目擊而二三人者相效而襲大封尚可謂之自靖自獻而又謂之仁乎且其辭亦自可見云庸建爾於上公尹兹東夏豈非始封之辭乎書序雖云不可信然亦有可信者秦漢之時去古尚近不如今更逺只是懸想無所據依也凡此皆是大公案古今皆相承襲未有以為非者豫不諱論之以俟知者康誥康誥酒誥梓材三篇書序以為成王時書而胡五峯吳才老文公皆以為武王時書蔡子因之其考證亦明不復可疑矣成王雖君其在康叔豈有専稱小子封之理右者君臣之勢不至若後世之懸絶詩王曰叔父建爾元子周家辭命稱尊行皆云伯父叔父伯舅之類此篇辭氣亦可證其為武王言也但不知是初封之誥否或封來朝又以誥之也或入為司冦而後往國今皆難以臆度但篇內明德慎罰雖是綱領而獨詳於用刑者蓋殷民化紂之惡如微子所謂卿士師師非度凡有辜罪乃罔恆獲小民方興相與為敵讐又紂作炮烙之刑則是邦之人其遭刑罰之不中極矣故指事歷條丁寧而告戒之意其蓋有所為此亦可以見紂惡之極而武王愛民之深也如酒誥亦是此意細觀康誥發首即曰孟侯則已為諸侯之長矣又曰肆汝小子封在兹東土推言其所以有國之由則非始封之辭矣篇內固以明德慎罰為綱領然大約明德慎罰不可作兩股兩事蓋慎罰必由於明德德之不明罰何由而能慎乎臯陶邁種德故能方祇厥敘象刑惟明此拳拳所以告之者欲其先務明德於已而後致謹於用刑也蔡傳以汝念哉以下言明德敬明乃罰以下言慎罰爽惟民以下欲其以德行罰封敬哉以下欲其不用罰而用德以太分析破碎夫心不敢有一毫之或肆則見於事不敢有一毫之或苟罰之所以慎者德之所以明也所謂敬典所謂敬忌皆一而已矣今民將在祇遹乃文考蔡傳謂今治民將在敬述文考之事愚以為今民即作今治民於文義不通又遹字古注訓述不知何所出大雅文玉有聲遹字甚多朱子以為其義未詳疑與聿可為語助之辭亦是以意㑹之大抵古字不可解者亦多今必欲隨字生義釋之亦有何難但終不是古人意思只當大段㑹其大㫖為是此句謂文王之德入人之深今民將在敬念乃文考汝當斷前聞而服行其德言則可以慰民而安民矣𢎞於天與下乃服惟𢎞王意亦同謂𢎞乃天道古人終日只是事天故無時不言天天道即王道也蔡說天者理之所從以出以太拘亦太深求耳天畏棐忱棐字以上通改作輔字文公謂漢書顔師古棐匪通用如是則此當云天可畏而難信民情可見而難保也乃服惟𢎞王語意當承上云乃服行此言惟恢𢎞王道保殷民也外事汝陳時臬司師兹殷罰有倫竊謂此是欲其勑用法之有司當司字為句下文陳時臬事則戒其自用法也當事字為句語意謂汝陳列是用法之司當令其師殷罰之有倫者汝自家陳列用法之事則當以義行之不可用汝之私意又有自矜之心也要囚作獄辭之要恐未知周禮異其死刑之罪而要之旬而職聽於朝即此事也爽惟民迪吉康者謂當明其道民於吉康者夫在上者以德化民民化於德乃吉康之道故我亦惟殷先哲王之德用以康又其民作而求之而已况今民皆染紂之惡無有迪於吉康之道者故皆不知所遹然則為人上者不有以迪之則何以為政哉今惟民不靜未戾厥心亦宜就康叔說謂今惟民未能安靜未止其心雖屢有迪之未能同歸於善則明明上天以為其責在於道民者之罪其罰殛我我何敢怨乎故罪不在大與多小有違天之事亦即是罪而罰之矣况使民不靜不從化則愈積愈盛其醜穢之德顯聞於天是其罪大矣罰殛安可逃乎蓋深念商俗之惡欲康叔盡反其舊俗而導以從善至於大同而後已也酒誥肇國在西土者周家自后稷封國至文王而人心歸之三分有二其國始大故曰肇惟天降命肇我民謂惟天降命於周以始有此民即肇國在西土之謂也天之降命如此是以有大祭祀而用酒也天降威者德不若天而天降威亦無非由於酒之過耳蓋言酒以報本亦以召亂也古今儒者皆以天降命為天始令民作酒殊不通爾大克羞耉惟君爾乃飲食醉飽丕惟曰爾克永觀省作稽中德羞耉蔡以為大能養老固好但爾克飲食醉飽則非老者之飲食醉飽矣上言養老而下即承云自家醉飽不通又克羞之羞作進字解二羞不同又克永觀省作稽中德先儒皆以為德全於身庶幾可以交於神明而與其辭意與饋祀相屬夫古人重祭祀葛伯不祀成湯伐之商紂弗祀武王征之故克羞饋祀其職已盡其義自足何必又加以克永觀省作稽中德之意冠於其首哉愚竊反覆其義以羞耉為大能進於老成之道而齒德為老成之人稱其居民上者則可以飲食醉飽矣禮居喪自六十已上食肉飲酒如故詩云為此春酒以介眉壽則古人於老壽之年不惟有肉而又有酒也爾能如是大可謂爾能長自察省作而稽乎中正之德矣蓋人若一時為善未可卜其終也一事合義未可信其他也人至於老成則其平日所以致謹於身而克成其德非特一時一事而已故曰克永曰中德斯可以取信於人而視法之矣又爾尚能進其饋食爾乃可以自介而用逸也大約二條一進於老成之時可以飲酒一祭祀之時可以飲酒古人於酒其重如此後世此義不可得而言矣其安能不蹈危亡之轍哉矧惟若疇圻父薄違農父若保宏父定辟此數言者古注皆父字為句王荆公始讀違保辟為句而朱子深有取焉大抵古書字義多不可通今以薄違為迫逐違命亦只是以意臆度若以為不違農時夫豈不可即如古注釋謂矧汝所咨問之圻父不可有違之農父汝所保安之宏父皆所賴以定其君者可不謹於酒乎亦未嘗不通蔡傳以薄違為政官之職而迫逐違命固若可通然以定辟屬宏父為制經界以定法則亦牽强甚矣且司空居四民時地利豈但定經界之一事耶竊意如此之類只當㑹其大義則道理自明若必細細以為盡得其義則於胸中亦未免破碎而又鄙笑前人以為惟我獨得此蓋宋儒承襲之病亦不可不知也梓材此篇反覆詞氣不似武王告康叔之辭故其名篇亦不稱曰誥也惟篇首有王曰二字故以為武王之言其實王曰以下皆似同列之辭意周公稱王之意而告之也自王啓監以下更可見若必以為武王之言亦只至戕敗人宥為君告之後面即為周公告之也古人記書多將前後事合成一篇加以中間一二殘缺遂有難讀今只㑹其大意如此蓋周公秉國之鈞康叔至親以理論之豈無相告之情故但以為周公之辭則一篇皆通而其數稱王以告之要在以德輔王而保民也若下文今王以下蔡以為臣下進戒之辭欲至於萬年以為祈天永命之辭皆隨文而求其義以為錯簡在此則余未敢信其必然也汝若恆越一條蔡傳朱子皆以為不可曉愚竊以為尚書之辭總是難讀而前後解釋不過隨文生義何獨於此而不然乎今亦以意解之蓋承上文邦君所係於民其重且切如此則汝可不自其身而謹之乎汝若常於言我有師師之三卿及尹旅曰我罔猛厲以殺人是無罪不可妄殺固為是矣然亦汝為君者先敬慎而勞來乎民於是彼為臣者亦往敬慎而勞來之也其於姦宄殺人歷人者合有罪而反宥之固為非矣然亦是見其為君者所行之事或戕敗乎人而亦反宥之故其臣亦效而宥之也是則刑罰之當與不當上之所好下必有甚焉康叔當正其身端其好惡以為臣民之軌則也王啓監至攸辟大約欲其以德化民又引古義而戒其所其監之者不至於邪辟也惟曰若稽田至丹艧則戒康叔以慎終如始不可有始而無終也今王惟曰至丕享則推言先王以德懷天下故今王設監立牧亦是既用明德之君以綏集天下故庶邦大來享也汝可不知此意而用德乎皇天至先王受命則言先王所以用德者蓋天以斯氏命先王使司牧之故今王惟欲用德以和懌先後迷民正以慰先王受命之意我之體先王者如此汝又可不知此意而用德乎已若兹監至未則欲其用是道以監其國惟欲助王子孫以保民也蓋惟德之用則慰先王慰先王則當天心庶邦效之四方則之邦不期昌而昌天命不期永而永矣秦誓曰以能保我子孫黎民是亦本於休休有容之量為人君者其可以刑威立其國而望其祚之久長哉召誥此因營洛之事召公訓成王之辭古人因事納諫况親政之始宅中圖大之大事耶周家以鎬京為根本屹然不動建洛邑於土中以臨諸侯是洛邑者乃其施政之地自武王周公規模久定特自今日始成之耳蔡氏謂周公本欲成王遷都洛邑而成王則未欲捨鎬京而廢祖宗之舊此說非也然營洛雖周公之規模専董其役者召公也想周公攝政事大其至於洛只是祭告頒書命即歸故召公因其歸而即陳戒耳取幣者蓋當時庶邦冡君以宅洛大事而至用幣為享而召公奉以達王故末云惟恭奉幣也越若來三字蓋有難曉蔡注亦未是既以此例堯典曰若則是助語之辭而又解云迤邐而來何其相矛盾耶古注作於順來三月是亦隨字而解古人越字若字常用下文若翼日乙卯若字想亦是助語之辭今㑹其意上文云二月此云越若來三月是即此年之三月非下年之三月也大抵此等處皆不可執泥必求字字訓釋則鑿矣用牲於郊者想只是周公攝行之蓋此時洛邑未成成王未至洛也至洛誥戊辰王始在新邑蒸祭歲先儒林氏謂召公營洛自戊申至甲寅七日而位成周公斷至自乙卯至甲子十日而用書庶殷丕作以為自成王至豐距甲子凡一月而成萬年之業周召規模其敏若此非後世可及以愚觀之豈有是理厥既命殷庶庶殷丕作此下更有許多事始成古書不書不盡載也豈有作一大邑城而一月可辦其忙逼勞傷聖人氣象大不然也雖云不日成之此只見文王得人心之至讀者正不可以文害詞也入錫周公錫字與堯典師錫帝曰之錫同非徒以幣與周公蓋重託而告之之意上告王及公并告庶殷及其卿士所謂上下勤恤也蔡注以卿士為不敢指王至謂猶今稱為執事者尤恐失之逺矣古人警懼畏敬之心合上下而皆然故能上下同德合三千人而一心後世惟不知此義故人各有心自君相而下殷民周士無不同德一心敬服天命此召公所以拳拳忠愛之誠也王敬作所以敬為所如仁為安宅義為正路之謂蓋安身立命於是造次顛沛於是更無有他事也召公告成王之辭亦自明白無勞解釋大約首推天命之有在欲王稽謀自天而不可不敬自有王雖小以下欲其盡元子之責以諴小民而化人而不可不敬化人亦所以諴小民也自王乃初服以下欲其謹於其初而不可不疾敬德也謹於其初亦只諴於小民而已其惟王勿以小民王欲王以小民受天永命則歸言愛民以永命也蓋天之所以改厥元子者亦哀於四方之民也然則王之所以受天永命者舍愛民其何以哉是欲王以小民受天永命一句一篇之骨子所謂敬德不一而足者又豈外是而有他道哉治天下之事後世言之纍卷帙不能盡而不知其實在是無多言也大學論平天下章亦惟在於民之所好好之民之所惡惡之乃知聖賢之言先後一轍有天下者其可不以父母天下為心哉洛誥復子明辟如古注孔氏皆以為攝而復政之辭至王氏安石乃以為復逆之復宋諸儒從之夫以為攝而復政者成王尚幼周公以身任天下之重何嘗履君位乎如明堂位所言踐天子位以治天下此漢儒附㑹之謬說也此固無俟於辨而自明者然伊尹周公皆有復辟之事愚固謂伊尹之任商周公之任周皆非後世人臣所可擬者有伊尹周公之聖而又有伊尹周公之任任之所在責之所歸故不得已而當之以聖人為之至誠感動始終有濟若無其德無其任而冒當之未有不犯於逆亂之倫者此王莽之徒雖竊以藉口然亦豈能以溷日月之明哉後儒因王莽之事遂將周公變易其說蓋不欲使公之忠聖一淆於逆亂之跡其愛公可謂至矣其所以待公不其淺乎嗚呼操之不可為文王莽之不能為周公豈待後世方知之而當時所為已如白黑之不可同日語矣混碔砆於珠玉之間何損於珠玉耶由是言之聖賢之事各論其實而已矣書序以此為使來告卜而作今詳其義全不重在告卜特敘其事自告卜始蓋洛邑既成成王初往新邑以發命施政而周公告戒之辭是時成王既長親政周公欲明農而成王留之君臣問答史皆録之以成篇重在治洛故名洛誥當宅中之始新政之初召公周公皆告戒之切大臣責難之義非後世所能及也周公拜手稽首曰朕復子明辟愚竊以為是與成王對面之辭非授使者之辭也王拜手稽首亦是成王對面復周公之辭當時周公定洛而歸復於王而因以告戒之但康誥之首以為是此篇錯簡則又似在洛之時豈成王與周公俱至洛之時所言耶細詳錯簡之言未見其然下文云豫齊百工伻從王於周又曰惟以在周公往新邑又曰汝往敬哉兹豫其明農哉則當時鎬京之言矣𦙍保者斷文武保成王也我二人共貞者謂已與周公共正以承之也易多言貞吉此雖獲吉猶必以貞成王此時可謂知勉於德矣周公所以欲令親政而自欲明農也觀於此言成王豈肯聽周公之去哉拜手稽首誨言是成王之求教也王肇稱殷禮至以功作元祀是周公以王往新邑必先祀典因此祀典教以御臣之道若謂以舉祀為首務而教之則自有一定禮典成王豈冥然不知如是耶豫惟曰庶有事語意謂豫惟望其庶幾有善政事也丕視功載載事也即載采采之載謂大視羣臣之立功行事而公行勸懲也以功作元祀是表異其已往者丕視功載是旌别其將來者二者並舉而行之臣安有不勸而政安有不舉哉乃汝其悉自教工可見以前皆周公總百官之任而此則始欲其出於成王是周公既有欲退之意矣成王下面留周公有云迪將其後監我士師工則成王猶未欲周公之退也又曰厥若彝及撫事如豫又曰乃惟孺子頒朕不暇又曰篤敘乃正父罔不若豫詳味先後之言皆是周公歸政之意安得不以復辟為復政但伊尹復政是太甲方免喪之期周公以成王已在位但其年尚幼國家多難而以身任其事耳及成王長而歸之使親政焉其與伊尹又不同矣先儒吕氏謂漢文近於惇大成裕而無所謂明作有功漢宣近於明作有功而無惇大成裕此大約言之其實先王以道治天下視後世以法把持天下者相去逺甚以道治天下只是至誠惻怛之意行於其間自然事體核實而又氣象寬裕彼以法把持天下者於二者何有頒朕不暇當如陳氏經云汝當頒我前日未暇為之事一一行之彼裕我民無逺用戾分明是教成王治洛之事先儒以公明保豫冲子以下為成王命公留後治洛之事王命豫來以下為周公許成王留洛之事今詳上下語意似不然蓋古史敘事多非一時之言但若此等則問答應對語脉相承不可分為兩處竊意在鎬君臣答問之言也若如蔡說則是以為成王周公皆在洛之言而上文汝往敬哉之言又不可云在洛矣夫周公謂汝往敬哉兹豫其明農哉故成王留之公明保豫冲子以下皆留之之言也上下語脉自應相接豈可以明農以上為在鎬之言明保冲子以下又為在洛之言分為異地兩時使周公陳欲去之言下無所接成王致欲留之意上與所承皆不可得而通也其屢稱王曰自是古體如此亦不可以為先後之言也讀者於此語脈既見得有下落則其所謂留周公者始可得而言矣夫留周公者但留其在左右以為輔非留其專治洛也蓋周公之意以為向不得已而任其責今亦可以少紓而成王之留則以已雖親政然不可一日無周公以慰天下之心故懇懇留之以自助也下云公勿替刑四方其世享則其所以屬望於公者何如哉由是言之其所謂即辟於周者是初欲往新邑以朝諸侯也迪將其後監我士師工者欲周公留在王朝啓迪其後且以為士師之表率也曰公定豫往矣往字即應上文汝往敬哉之往將謂往新邑欲周公安定已以往也若如蔡說則上文周公方戒王以往新邑未見其至新邑而下文成王又即告周公以往鎬京耶况其所謂和恆四方民居師惇宗將禮稱秩元祀皆是王將往新邑之事則此為在鎬無疑矣大抵建洛邑以朝諸侯以𢎞王政此天子之大事也故謂之成周者言王化之成也武王之意周公終之正為億萬年王者宅中圖大之地其事何其重而成王初政又孰有先於此耶故召公因奉幣而旅辭周公因即辟而致訓其致難致慎如此蓋深有見於斷天立極之大義也豈有周公身自營之而又身自居之成王在西周公在東是二王矣孰為中天下而立以朝諸侯者哉向者武王既崩成王尚幼周命新集人心未固周公以身直當其責雖非履天子之位然天下之事悉屬於周公矣此在人臣另是一格豈周公之得已哉今者成王既長新邑初成天下方拭目以望新辟之政而周公亦正欲其示儀理以慰天下之心而亦可以息肩於已也而又何待於已之居之而居之又何名耶周禮云天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉若以為周公鎮撫之地則不必營建若是之重營建若是之重則決非人臣之所宜居矣此與後世留守之義自是不同宋儒惟以後世為例看之太輕故有周公治洛之說也然周公雖不必留後於洛而其所以處置訓化殷民者皆周公之責任經畫也故君陳畢命以始中終言之尹與保釐在二父之特命又自不同豫小子其退退字必有缺誤不可强為之說古注謂我小子退坐之後皆强說命公後者還當如古注之說云命立公後公當留祐我宋儒以為命公留後於洛恐周時未有留後之說以後世之事而凖古人非其據也下文王命作冊逸祝冊等事如許之重非分茅胙土特大重事何至如是若只命留後鎮撫亦自不須如此且此云即辟於周如蔡氏注是舉祀發政之後即欲歸居宗周則所謂命公後者當是在宗周命之之辭語脈方相承而下文命後乃在新邑其說不得通矣人命公後是成王面告周公之辭若命伯禽可加命字若即欲周公留後則當云公其後加一命字又不通矣蔡注又證以費誓東郊不開乃在周公東征之時此書序之言也但書序亦只言徐夷並興安知是周公東征之時惟史記魯世家則云伯禽即位之後管蔡等反淮夷徐戎亦並興於是伯禽帥師伐之遂平徐戎似為可據但史記作於載籍焚滅之餘史遷志在成書其歷年先後世次多不可依今當以尚書為準寧缺史記之疑以信尚書不可遷就尚書以合史記也且命後作冊其禮至重非命留後無疑而居洛與王對峙決非周公此時之所宜然矣詳味即辟二字即上其基作民明辟下文亂為四方新辟之辟蓋皆始事更新之辭若歸居宗周則成王即位已久不可言即辟矣公無困哉我惟無斁其康事成王以自已能不厭於安民之事以留公則周公之心成王之志皆可識矣王命豫來至永觀朕子懷德是周公許王留而相勉以成績之辭其屢屬意於殷者殷人引考乃為道化之成也以後世言之區區殷遺何足介意即不殄滅之亦必拘繫禁錮而使之無能為也惟王者則不然彼其心以天地萬物為一體一夫未格疾痛在身故必使殷民皆革心向化欣然如一家而後已故置之不較非王政也驅之以刑非王政也優游於道化之中如陽春動而萬物生此聖人之所以成化也故受有臣億萬惟億萬心武王有臣三千惟一心古人明明德於天下皆是如此此周公所以拳拳於殷之遺民非若後世自私自便富有天下之意也王命豫來以下周公語氣大略謂王命我留承保光明文武之業以益大我責難之恭王之意固云善矣但王孺子來相宅方新邑新政之初其大惇厚其典禮與殷之賢人以致盛治為四方瞻仰新君作周家恭敬之先蓋王能恭則臣下罔敢不恭而後王亦無不承其恭矣所謂恭先也由是而咸曰其自是中立以治萬邦咸有休美惟王有成績此今日營洛之意也王能如是我旦豈敢必其去耶當倡率衆卿大夫及治事之臣篤厚文武成烈答天下之心作周家信臣之先君臣各相勉於為治庶幾成我明子儀型於天下而盡文王之德矣使時時謹慎殷民殷民亦自然從化此時乃命豫安寧也謂之寧者是致政之事也豫於此時樂周道之有成以鬱鬯之酒致其精神拜手稽首以休美致享不敢越宿而告於文王武王以慰二聖之心且致其祈禱之辭也曰明禋者即以秬鬯之酒謂之明禋所謂黍稷非馨明德惟馨也王伻殷乃承敘萬年其永觀朕子懷德又總結而勉之以致意於化殷也觀成王留周公皆是廣及四方之辭周公戒成王則尤以殷為重若謂王命豫來以下為周公許留治洛則孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中又皆是教成王治洛之言方勉之以往何嘗聽成王之歸鎬京而以己任之耶豫旦以多子御事云者只是許王以不去而率諸臣以盡輔弼之道而已何嘗見其許之治洛耶此等辭語尤為可驗細詳成王留周公之辭皆是廣及安定天下之大計而非専為治洛而發云光於上下勤施於四方謂周公之德在於天下則欲周公不去以久厭天下之心也云功棐迪篤罔不若時則欲周公輔導啓迪時時如常也云四方迪亂未定於宗禮則欲周公不去使四方皆安定其功也云誕保文武受命民亂為四輔周公去則左右前後輔導無人而民不安故欲其留以為輔也四輔如王制設四輔及三公左輔右弼前疑後丞為四輔也云公勿替刑四方其世享則欲其不去為四方之取則也凡此皆只留以治安國家之意何曽専及於洛邑一方之言如後來君陳畢命是専命之辭自然諄諄不息蓋以周公之德在成王當留以自輔君陳畢公保障一方之才也周公之功於洛邑不宜以更居君陳畢公則可以無所嫌也此其道理可信之大者有見於此則其區區援引證據亦無事頰舌之煩矣乃命寧蔡注以寧字屬下句為綏寧周公而又謂明禋休享事周公如事神明也周禮王禮上公再祼而酢固有尊之以神明之禮但此是周公自言周公豈應預令王以神明之禮來禮已耶古人鬱鬯最重皆不宜周公自言今只依古注寧字為句以寧為致政而安寧如蔡以周公治洛則是方有政事亦不可自處以謂之寧矣戊辰王在新邑以下方是紀王往新邑之事誕保文武受命惟七年則只是攝政之七年也朱子謂前已屢有答問之詞其後乃言王在新邑有不可曉因以詰吕伯恭無以答以愚觀之正為前面問答為詞未有下落故此遂不通前面既是在洛問答如許之詳此方紀戊辰王在新邑為說不去於此又可以證前面通是將往洛之言是猶在鎬京也多士惟三月者竊謂即召誥越若來三月蓋即是營洛之年方遷殷士遂營洛以居之故誥告之也蔡注以為成王祀洛次年之三月蓋由於周公治洛之說也不知康誥之首稱三月召誥周公至洛是三月而此人稱三月可以見皆一時之事也夫遷徙重事况遷商遺民多士所係非輕得不有以告之耶蔡祖吳氏之說以武王已有都洛之志故周公黜殷之後以殷民反覆難制即遷於洛至是乃建成周是以遷殷在營洛之先矣而洛誥云我卜河朔黎水固欲以遷殷不得卜又卜瀍水東為下都是當卜之時未有定處若在先已遷則一定之所何待至此而兩加之卜耶此其事跡明甚無可疑者惟其膠於周公治洛之說故以此為周公之新政而以意為之說耳大抵去古既逺日月先後亦無由知讀尚書者惟須得其大義為要若是則周公未嘗自留後治洛也若是則告戒殷民惟欲其順應一德而非以其數反覆難制也下文豫惟時其遷居西爾與移爾遐逖豫惟時命有申皆謂今日遷時事非本前日而言也非我小國敢弋殷命我其敢求位皆言其非出有心之私也惟天不畀惟帝不畀皆本於天命之公也然天命非他亦視下民秉為而已此皆至誠惻怛以告之所謂推赤心置人腹中者也殷士之賢者寧不知所警動乎惟我事不二適惟爾王家我適謂我之事不容有二而之他惟爾王家亦我適此事勢之必然者詩云商之孫子其麗不億上帝既命侯於周服所謂惟爾王家我適也豫之初意以為惟爾大無法度我不爾動聽從乃邑言不遷汝然亦念天即於殷而降大戾者由是不正其法度之故是又不可以不遷也紂之身死國亡武庚又敗四國被誅所謂大戾也豫惟時其遷居西爾則告以必當遷也蓋殷既淪喪又遷其臣士於新邑喪敗變革之形人情豈能無不堪者故周公告教委曲如此若是遷居既久人情自漸消亦何事多言哉以是又見遷頑民在先為臆說也豫大降爾四國民命我乃明致天罰謂誅其君弔其民所謂大降民命也移爾遐逖比事臣我宗多遜當如孔氏謂今移徙汝於洛邑使汝逺於惡俗比近臣我宗周多為順道尚書疑義卷五

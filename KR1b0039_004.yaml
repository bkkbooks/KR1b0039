body:
  text: 尚書疑義卷四明馬明衡撰周書泰誓此篇書序以為十一年觀兵十三年會孟津通以文王九年數之為十一十三蔡傳深辨其非而以經文為主經云惟十有三年春即為武王即位之十三年也夫虞芮質成西伯受命稱王此司馬遷不達理道之舛後儒因祖其説孔傳又證以惟九年大統未集之言而亦以文王為改元也歐陽修亦深辨其妄説夫改元之事設或有之非因斷虞芮之訟然至武王不改元則惑矣蔡氏以書序十一年一字即十三年三字之誤謂無有觀兵復退之理犯於兵以脅君而引張橫渠之言當日命絶則為獨夫天命未絶猶是君臣豈可以兵脅之耶此論極正然戡黎又為文王稱兵畿內至祖已奔告又非脅之耶即以西伯為武王通鑑係年謂在於商紂三十一祀丁丑之歲而大會孟津為己卯則亦先二年不能無稱兵震動之嫌凡此皆可疑難曉者豈當日命絶已在於戡黎之時而武王特未即大舉先剪其助紂為虐者至十三年始會諸侯以伐之耶而武王當時服從者衆紂之離心離德亦不畏其圖已耶朱子謂繫年至共和以後始可考故若此者亦但當觀其大義其實不可得而詳也大抵共和以前繫年亦只憑皇極經世遡而推之以至於堯之甲辰驗之後世人事與數相當故今以為邵氏之厯然以前安有史籍可考經世以己巳周文王沒武王即位己卯周武王伐商是伐商乃正武王即位之十一年是亦或即書序之文而推繫之耳而亦未嘗以文王九年通武王而數之為十一年也然夷齊叩馬而諫謂父死不葬爰及干戈可謂孝乎無有即位十三年文王未葬之理是又近於孔氏不改元之説意史遷所撰夷齊之言亦只得秦漢之傳聞而未足以為據耶愚以為凡此姑當缺之而惟論其大義可也論其大義者必知文王至德必不受命稱王也必知武王非富天下也必知天命未絶決不以兵脅君黎之可伐必是天命已絶也如是觀之則聖人千古之心可以近見於千載之下而千載之下可以仰合於千古之上其於改元不改元十一與十三何暇計哉惟天地萬物父母惟人萬物之靈文公謂湯武征伐皆先自説一段義理愚竊以謂聖人除却義理更無事命我文考肅將天威大勳未集觀武王此敘則似文王時已有意伐紂但未舉耳而蔡傳以為敘文王之辭不得不然而文王實無意也如是則為誣文王矣夫謂文王先有意則不臣謂誣文王則不孝先儒於此論之多矣而皆未能使人心之快然者文公謂若使文王未崩十二三年則孟津之事文王亦豈得而辭哉此見文武之心未嘗不同也愚以謂文武之心未嘗不同然文武之作用自别同一聖人也堯舜自堯舜之作用湯武自湯武之作用文王周公自文王周公之作用作用之别則以其力量有不同耳千鈞之任烏獲舉之而不難次於烏獲者稍難矣又次者則又難矣雖同曰舉之而其所以舉之者作用自有異耳文王之力量恐亦非武王之所能同也當其三分有二之時關雎麟趾之風漢廣汝墳之化如陽春之生物物無不應豈待以兵戈而勝之哉雖伐密伐崇文王所不免然亦如舜之有苗耳而天下大段日歸之所謂綏之斯來動之斯和聖人至德感通之妙自是如此使文王未崩紂惡愈盛三分之一又自然歸之紂雖尚在然天下之人既通歸之矣紂亦若之何哉至此之時或紂自逃走或人殺紂皆不可意度然決不以兵戰而取之也夫任天下之責以安天下為心者聖人之所同也而其所以任之安之作用聖人不能無異也作用雖異而其心則同所以同謂之聖人也所謂肅將天威大勳未集者武王以得安天下之民為大勳文王三分有二其尚未得安為未集也天視聽自我民視聽天既怒商民皆歸周天威之將非文王而何武王開口便説亶聰明作元后元后作民父母又曰天佑下民作之君作之師武王分明以父母君師自任如此則視紂之惡天下之人受其曓虐武王豈能一日安哉於此可以見武王之心矣有罪無罪一聼於天武王何心哉受臣億萬惟億萬心豫有臣三千惟一心則天意可見矣故承之曰商罪貫盈天命誅之豫弗順天厥罪惟鈞也言一聽於天而已矣豫小子夙夜祇懼受命文考所謂受命者只告諸文王之廟即為受命非真文王密有所命也蓋時既當然即道理當然不越乎道理即不違乎文王矣文王武王作用雖有不同然其安天下之心一也後世曹操自擬文王而使其子丕取漢為武王嗚呼是豈可同日而語哉聖人之事乃為姦宄欺世之資兹故不可不論泰誓中漢律厯志曰周師初發以殷之十一月亥月戊子後三日得周正月子月辛卯朔至戊午渡孟津夫以十一月為亥月則是商亦改月矣此恐未然先儒林堯叟謂孟津去周九百里師行日三十里凡三十一日渡河三日三誓師上篇不言日以中篇考之當是丁巳日在河南將渡孟津誓而後渡河也中篇是既渡而次河北所誓下篇戊午明日將趨商郊誓而後行三令五申謹之至也此説固為有理但湯之誓師未嘗至再至三豈湯之致謹又不如武王耶此等皆有不可曉處意者武王從容而行先後來附而至者日衆故武王因其後至者而復告以伐商之義也諸侯不期而會者八百餘國豈無道里逺近先後之差哉泰誓下六軍者天子之制今稱大巡六師蔡氏以為史臣之詞亦是大雅棫朴是文王之詩亦曰周王于邁六師及之文王武王尚為諸侯不應便有六軍或是史臣從後詠歌紀録之時既稱王遂亦因稱六師耳但湯武誓師皆稱王曰或如愚所論舉兵之時已正天子之禮遂稱六師前後足相發也且其言已曰奉豫一人曰獨夫受他復何所嫌乎然周禮萬二千五百人為軍二千五百人為師則五師乃為一軍六師未可謂之六軍也又常武之詩整我六師瞻彼洛矣之詩以作六師孟子云六師移之是皆天子之制亦稱師者豈未有周禮之先天子六軍之制未立諸侯稱六師者亦舉衆之通名耳至周制天子六軍其後因習亦以六軍為六師耳春秋之兵雖纍萬之衆亦稱師可見天有顯道厥類惟彰謂作善降祥作不善降殃此理昭然不可得而昧也紂之所為如此安得不奉天命以行天罰哉武王誓師必稱文考者蓋文王在位五十年其德入人之深天下之歸周者實皆由於文王武王之意以為今日終文王之事而又懼其為文王羞者此聖人至意惻怛之心也牧誓司徒司馬司空亞旅此皆周禮未定時制或猶仍其舊也雖稱王以誓衆而於此等制度未必盡備但周官六卿周公所制亦不知殷人之制何如甘誓乃召六卿孔注與蔡氏皆以為六鄉之卿非各率其屬之六卿也不知夏制亦六卿否洪範八政只有司空司徒司冦則商時亦未必是周之制也周官云唐虞稽古建官惟百夏商官倍亦克用乂至周有三百六十則周制與夏商不同多矣孔氏以時已稱王而有六師亦應已置六卿此特以司徒主徒庶司馬主軍旅司空主壁壘蓋特呼治事之三卿耳是亦未可知也此篇專指妲已而言蓋紂之惡由於妲己廢宗廟棄宗族任罪慝以曓虐百姓只此數言已足以致天討矣何必多哉觀此篇與泰誓之言真有不同武成武成之書諸家多所更定而各有不同或以日辰之先後則云既生魄當在丁未之先或以行事之重輕則云未祭告不敢發命蔡氏集諸家所長而考定之今行於世愚竊以為武成之脫誤固不能無必欲更定以為此條係於此條之下則又安可知是不若因其舊之為愈也今觀古本如初敘于征伐商遂敘王來自商偃武修文遂敘祀於周廟大告武成遂敘諸侯受命於周而斷之以王若曰皆辭意相屬是古人敘事之體惟其承厥志之下則似有缺文底商之罪以下皆是史臣敘其禱神立政之事不可屬其承厥志以為皆王言也大抵去古既逺復值簡編斷蝕之後欲細細必求得其一字一句之不差斯亦難矣惟大義昭如日星未嘗以簡編斷蝕而不可知也學者不惟大義之沈潛理會而必欲細求之字句之間以為悉得古人之舊是皆宋儒著述之説有以起之也况孟子已不盡信書於武成取二三䇿何嘗悉以為武王之世之舊文哉而孟子未嘗筆削而更定之是知古人觀書與今人觀書大不同也今如所定新本將底商之罪云云至萬姓悅服敘於厥四月哉生明之上次第擺布將來真是後世文字也武成月日如孔疏亦自明白一月壬辰旁死魄謂伐紂之年周正月辛卯朔其二日為壬辰翼日癸巳王朝步自周于征伐商謂正月三日發鎬京始東行也其月二十八日戊午渡河二月辛酉朔甲子殺紂其年閏二月庚寅朔三月庚申朔四月己丑朔厥四月哉生明謂四月三日月姑生明其日當是辛卯也丁未祀於周廟四月十九也越三日庚戌柴望二十二日也此説與漢書律厯志所引不合而孔氏以為漢因偽書而為志而朱子亦言漢書之誤則如此説亦歷歷可推似有依據但經文既生魄孔傳謂魄生明死當是十五日之後而穎達以為丁未已是此月十九日矣不應生魄倒在後遂以受命為祀廟之前惟此有疑竊以既生魄既者盡也當是晦日昔人有問於朱子者亦然正與余合顧命云惟四月哉生魄以哉對既言之其義又自明白矣武王告諸侯敘后稷太王王季文王相承以成王業者蓋太王王季文王但知修德而人心自然歸附至後人推王業之所由姑自不得不如是立言非太王王季文王先有代商之心也若文王伐密伐崇當時文王得専征伐密崇當時無道害民故文王伐之意在安民非伐其不二於已也文王既有聖人之德又有如是之威四方歸附自不容已文王何心焉惟斯民得其安君心之或悟則亦已矣所謂大邦畏其力小邦懷其德者亦當善觀之惟九年大統未集注疏皆以為文王受命改元至九年而卒史遷則直以文王受命而稱王矣殊不知所謂誕膺天命者亦自後言之文王何嘗自以質虞芮之成為已之受命而即改元以應之哉如是則又何有於稱王哉蓋文王改元與否皆不可知即有改元之事亦是偶然決不以已之受命而更端也况未必有改元之事耶九年之文亦自後人追溯諸侯歸服文王之時而言之蔡傳之説是矣武成如有道曽孫周王發及昭我周王之語皆有難曉處夫武王告神之時紂尚未斃武王豈遽先稱王耶若後世起兵亦有先自稱帝者是蓋欲以繫屬人心豈武王舉兵之時諸侯亦即尊武王為王而武王亦遽受之耶蔡氏以為史臣追增之辭豈録其當時告神之語而輒加以追增之稱耶朱子釋孟子謂商人而曰我周王猶商書而曰我后也則是當時武王雖未稱王而天下之人固以王歸之矣武王自言天其以豫乂民則武王亦固任其責矣非若後世舍曰欲之而又為之辭者此皆大義所在讀者須求此而得其心之安而拘於字句之末不足為重輕也余姑發其疑如此而俟識者考正焉周王之稱豫既發其疑矣後再觀之如湯誓等篇皆即稱王泰誓稱六師分明是已正名位矣洪範書序云武王勝殷殺受立武庚以箕子歸作洪範則洪範是歸鎬京之日即為武王陳之所謂惟十有三祀者即泰誓之十有三年春也一説箕子走之朝鮮武王即而封之後來朝周武王訪以天道乃陳洪範則謂十有三祀者是箕子受封之十有三祀矣夫以箕子自言殷其淪喪我罔為臣僕今既受其封又自來朝安在其不為臣僕乎然則武王既釋箕子之囚加以賓師之禮就而訪焉故箕子陳之若云箕子不忍周之釋其囚走之朝鮮是雖未知其説之所本然意朝鮮在萬里荒服之外山海極邊今箕子舊國在焉酋長來朝者皆習箕子文教之古風當時若非逃竄避周何至如此之逺是亦猶太伯避季歷逃之荆蠻也但箕子聖人至則自然人歸宗之如麒麟鳯凰人爭快覩故箕子自撫其衆得其地而為君耳若説武王封之必有命辭若微子之命者夫子必録之即書亡序篇亦無有是未必武王封之也若陳洪範則大公道理自是不妨武王不臣箕子而問道箕子傳道武王而不臣各行其本心之誠然而無所愧焉耳矣洪範之書注疏以為是箕子告武王之後歸而次敘成篇以為典教如是則是篇通是箕子之筆蔡注亦云箕子推衍增益以成篇故謂稱祀者不忘本也夫以稱祀為箕子不忘本是矣然所謂十有三者抑武王之紀年耶商之紀年耶抑亦箕子朝鮮之紀年耶以為箕子朝鮮之紀年則武王須遣人訪之篇中詞氣非逺隔之體且武王即位七年崩此其不然明矣以為武王之紀年則箕子不忍祀之一字而忍於襲商未殄周未王之紀年安在為不忘本耶此等皆重有不通而先儒亦無有明辨之者何耶愚反覆思之沈潛其義是篇蓋武王既訪箕子既陳周之史官次第其語而成篇也稱祀不稱年者則武王重箕子之不臣尊箕子之道故特以商之舊稱之此聖人大公無我之心也箕子微子之事皆古今大公案故特論之以俟知者易曰河出圖洛出書聖人則之當時水患既平至和之氣融會浹洽故神龜出洛背上具此自然之數亦天地至和之精也然背上亦只有點數自一至九而已非如班固輩所言有文字也聖人道理具足於心因感而見故因其九數而即繫以九事以備治天下之大法也使洛不出龜禹之治天下何嘗無法然觸類而通若或啓之聖人何嘗恃已而忽乎天哉繫疇如畫卦伏羲分明見得天地間道理不外一隂一陽有春夏必有秋冬有明必有暗有盛必有衰有高必有下有雄必有雌有奇必有偶至於細微纎悉無物不有無處不然於是畫一奇以象陽之純而健畫一偶以象隂之順而靜而隂陽又非判然為兩物也故又畫陽中有隂隂中有陽蓋相涵相生至於無窮具三才而止而成八卦伏羲亦是道理熟於胸中故畫出以示人使人觀其象而盡人事以法天也文王重之以盡天下之變為六十四卦於是取每卦之象而繫之以辭周公加之為三百八十四爻於是取每爻之象而繫之以辭無非使人觀自然之象而盡人事以法天也伏羲示人只有八字文王六十四字之外加詳矣周公則益加詳矣今禹於九疇亦是觀天地自然之數而繫之以九者之辭無非盡人事以法天而已矣禹之辭止於九者至箕子則亦加詳矣疇與卦之用雖不同然其理則一理者天也在天則為天之理在人則為人之理盡人之理以合天之理疇與卦之用皆如是也非特九疇八卦雖聖聖千言萬語未有不如是者也今欲畫卦亦甚易眼前不拘器物花木土石之類即其象皆可以起義而畫卦只是道理不純熟徒為空言亦不透徹若聖人觀一物便發透許多道理出來是足為萬世之大法也細玩終篇箕子専就人事上體貼後世専就數上推測始知聖賢法天之學與術數不同九疇之序文公謂因洛書之位與數而為之如洛書一位在子其數則水之生數氣之始也故為五行以下云云甚偹愚竊以為不必如是分配亦自可通蓋皆以人事施為先後之節次而繫之也惟五數居中則取象人君立大中之義此不為無意其餘者或亦未必牽泥如是也今觀九者備天地間之事矣五行萬事之本故首之以五行其見於人則五事為人事之本故次之以五事先自治而後治人於是有政事之施焉故次之以八政為政必順天時故次之以五紀五為中央土四方歸向而取則焉故為五皇極而兼統乎四維然皇極立中於此天下之人有不齊之等則不無抑其過引其不及之權衡以齊一之故次之以三德欲盡其道理質諸鬼神而無疑也故次之以稽疑人事雖盡於已而天人感應之理如響應聲欲奉天而不違也故次之以庶徴使天下之人皆知趨吉而避凶也則民皆躋於福祉仁壽之域所謂於變時雍天地位萬物育者至治之極功也故以福極終焉此其治天下之大法又安能有出於九者之外哉考之周禮大段不外乎此如建極之事則武王周公躬行心德之餘無非大中至正之矩如三公論道師氏保氏之類皆所以飭王躬者也五行八政食貨則冬官之居四民時地利者所不能外焉五事三德則司徒所教者不能外焉至如稽疑則龜人筮人具焉五紀庶徴則馮相氏保章氏具焉五福六極之嚮威則周行於其間不能一一枚數是雖武王既聞箕子之言然大段治天下之道率不能外也雖堯舜典謨考之亦皆備具所謂千聖一心也學者能求之吾心根本已具則以之而用於世又豈有他道哉五行之生成雖有隂陽先後之次然其意在乎審其性以别其用要宜於民順乎天而已矣聖人之治天下聰明睿智雖無所不周然未嘗不用天之道因地之之利蓋道理本自合一聖人惟無所違故感通無間至於位天地育萬物亦惟此理之極耳此洪範所以生五行禹謨所以生六府也周官之辨土壤測日景致日致月觀妖祥辨星土雲物十有二風及草人稻人仲冬斬隂木仲夏斬陽木與夫藏氷發氷無非五行之用此古人之治所以與天合而嘉祥至後世無一而不與天違也聖人之治天下無有不本諸身者故五行之下即以五事為先五事克備則人道盡於已以之而治人又孰不以為則孰不敬應哉人莫不有貌也貌而暴慢不可以為貌矣恭者貌之本體故貌曰恭人莫不有言也言而鄙倍不可以為言也從者言之本體故言曰從人莫不有視也視而邪僻不可以為視矣明者視之本體故視曰明人莫不有聽也聽而淫哇不可以為聽矣聰者聽之本體故聽曰聰人莫不有思也思而不正不可以為思矣睿者思之本體故思曰睿謂之曰者謂此名為此是即其本然之體也人徒謂已具是人之形即以為人不知不能踐其形雖名為人而實非人矣學者反之於身可不求其本體之實乎箕子之言可謂至深切矣恭從明聰睿者五事之本體肅乂哲謀聖者五事之致用自漢以來五行五事分配相屬各各不同素問五行又不同矣愚意配屬雖有此理然亦看得活落不要粘泥聖人相授受之意不専在此只要實體之於心身便是何必只管代他分疏何益之有八政如食貨為先賓師為後固有內外先後之差其餘亦大段歷而序之若必一一求其次第亦恐太鑿八政雖與周官不同然其承天意以厚民生若民性則千古聖賢無二道也古之聖人知天人合一之理故於人事不敢不盡而於天之道亦不敢不謹堯之羲和舜之七政洪範之五紀周官之保章氏皆所以致謹於此蓋一以敬授人時一以敬天而不敢忽也吳幼清氏解五紀詳細五為九疇之中故又取象為建極之義而其所謂建極者亦不外五事道理非五事之外又有所謂極也聖人之言與後世安排布置不同隨事立義而道理自相貫通不待牽附之使合亦不能分析之使離也皇極二字自漢以來訓皇為大極為中謂為大中之道至宋諸公始異其説以皇為君極為至朱子蓋深論之而尤謂極字不可為中愚竊謂此皆未免専就文義上理會然其實道理亦不能離乎中之一字也洛書東西北南橫縱五數皆居中大禹分明取象人君中天下而立立大中之道之義而苦苦要辨其不為中者抑亦似戾禹與箕子取象之本意也况中為至極之理天下道理至於中而止矣中又何嘗不兼至字之義乎若徒至而不中則至字亦有何好處而又烏可謂之極耶然則即訓作至字亦不能離乎中之理孰若訓中之為盡乎又古人皇字極重如云惟皇上帝皇矣上帝皇天之類皆以加於天帝之上謂惟天足以當之三代稱王未有君稱為皇之語况箕子不臣於周篇中曰而曰汝不一而足豈遂加以天帝之徽稱又勝於周之臣子之美其君耶文公謂皇若為大不成皇則受之為大則受之惟皇之極為惟大之極乎愚意此二句者舊注解得自好亦曷為不通若必以是為不通則五皇極亦不成謂五君極乎上次五曰建用君極尤不可通矣無逸篇皇自敬德皇又豈可訓為君乎今似只依注疏舊解以皇訓大以極訓中謂天之大中之道也此其道理自正然建之者自是人君之事也人君繼天立極盡天下大中之道為四方之所取則所謂皇建其有極也五福即次九之五福福者德之安裕人能盡大中之道則至和咸萃五福斂聚於身自然之理今立大中於上而庶民咸化於下是聚此五福以敷錫庶民也建立之幾不息涵濡之化益深惟時時使庶民在汝極之中是民亦與汝共保此極也詩云羣黎百姓遍為爾德蓋亦錫汝保極之義此數語言人君當如是以建極也凡厥庶民無有淫朋人無有比德惟皇作極此數語者言使天下之人皆如是則可以謂之大建極矣此即所謂明明德於天下篤恭而天下平之義也民人二字先儒陳氏分作民與有位者而言古注文公皆不分只總統説以上文用敷錫厥庶民只説庶民耳若分説道理亦自無妨然不若統説更覺無破碎耳凡厥庶民有猷有為有守至其作汝用咎皆言化道勸教之方以謂必如是使天下之人皆歸此大中之道也大略作三段看首段至時人斯其惟皇之極言人之資質有此三等皆當隨資質而成就之以進於大中之道也二段無虐煢獨而畏高明言人之所處有此二等不可以微賤而忽不可以貴顯而避咸皆抑其過引其不及而齊一之以進於大中之道也三段人之有能有為使羞其行而邦其昌數語言於用人之際皆當盡其才而不濫恤其私而不薄如是以勸勉之以進於大中之道也蓋聖人以萬物為一體天下之人無不欲其人於善故既立大中之本以為觀化之則而又盡時措之宜以盡曲成之方天下之人其孰有不協於中者耶煢獨者孤寒之極無所資而不能為善者高明者賢智之過有所恃而不肯為善者世間人亦有此二等也無偏無陂以下則協為歌詠之辭以使人感動興起而自得之所謂皇極之敷言也詠嘆此言箕子所以致意於皇極者深矣會者合而皆同也歸者安而不返也上言人之資質成就隨其等第區以别之至此則皆趨向而同來矣浹洽既久厭飫日深自然安固止於是而不遷所謂會其有極歸其有極也以近天子之光謂親被其道化之光蓋民之與君有上下之分勢不能不隔絶今皆敏德歸於皇極之中則一德一心感通無間故曰近天子之光為人君者必能如是則可謂作民父母以為天下王矣然則為王之義其重如此當其責者寧有幾人蓋數百年始一見焉湯武生當其時天豈無意而其責又奚容辭乎箕子之陳洪範其微意亦可識矣三德聖人所以齊一天下之權蓋天下道理自有是三等非聖人齊一之則不能歸於中惟辟作福以下箕子所拳拳者必是殷末習於紂惡服食無度感於當時之事故欲君德以剛為主而所以操夫齊一天下之權者也卜筮之法自古以然舜命禹曰官占惟先蔽志見命於元龜朕志先定詢謀僉同鬼神其依龜筮協從是古人之大事未嘗不卜筮也古人事天終日欽欽對越上帝動必以天而其所謀之事本無不與天合者又詢諸人而又以為恐有適莫之私則質諸卜筮以決之天何心為卜筮者天之命也至是則與鬼神合其德矣故卜筮者聖人所以齋戒以神明其德也由是觀之聖人舉事何者而非天耶故古人動稱天者非虛言也卜筮之兆有方功義弓不詳其義有體色墨坼體為兆象其象有金木水火土之異色為兆氣其兆之氣色似有雨霽蒙驛克之異墨為兆廣正釁處也坼為兆釁正墨旁有竒釁罅者也體有吉凶色有善惡墨有大小坼有微明皆以為占而此只是五者則五者之中亦不専指氣色而釁罅大小微明皆兼之矣其經兆之體百有二十其頌千有二百則其占視之法亦多而今皆不傳矣左氏云筮短龜長疏家以為無是理乃是當時有為抑揚之言此意亦是或者以筮尚由人扐揲之而龜由於灼其兆自見人更無所預也庶徴雨㿩燠寒風五事之應求之太泥固不可全然不信尤不可蓋天人感應分明道理豈可誣也自鳯凰圖書之瑞桑穀雊雉之異雷電大風之災皆感應之速至逺至近但漢儒道理不實體求之太淺耳夫水能勝火理不可誣一杯之水勝一車薪之火則不能矣五行傳云貌之不恭是謂不肅厥罰恆雨惟金沴木夫一不肅其貌即罰常雨今人君不肅者未必即罰以常雨也如此則人君將玩而不信矣此蓋求肅字之意太淺耳是謂一杯之水也夫箕子所謂恭作肅者豈但容貌一時嚴肅而已耶聖人之恭盛德之至肅者恭之妙用也恭而作肅必其自一身以達於朝廷天下無一而不肅其為用大矣又豈不足以動天耶雨㿩燠寒風皆然况聖人五事一齊備具至於感應者皆極其功效而言如是則善從善惡從惡斷然不虛非責備於一事之間而取效於旦夕之速也是故為人君者為善而欲極其善必勉而後成為惡而遂極其惡其勢所必至休徴難致咎徴易來可不懼哉曰王省惟歲以下蔡注以雨㿩燠寒風貫之有係一歲一月一日之利害固是道理然以庶民惟星例之則不可云雨㿩燠寒風有係於一星之利害者文義似為窒礙竊以徴不言數而云庶者天道無窮而難知人君無時不致謹故又察於歲月日與星以考究其得失亦所謂庶徴也王之體大必一歲之利害乃可以當之卿次於王師尹次於卿則當一月一日之利害也歲月日時無易者謂一歲一月一日之間無有變動僣易之事也星者民之象星有好風好雨則民亦有所好所惡矣為人君者民之所好好之民之所惡惡之則亦月之從星矣日月之行則有冬有夏只是起下文月之從星之語此日月字與上惟日惟月日字恐不同上文是一日一月之日月此指日月之本體而言若以上文日月皆為指本體則歲當為太歲一歲移一辰之歲然以卿尊當月師尹卑當日又不通矣文公因庶民惟星星有好風好雨與上面不貫故謂家用不寧以上自結上文了下文却又説起星之意愚竊不然蓋王惟歲卿士惟月師尹惟日庶氏惟星立言一例豈有不同是皆所謂庶徴也但歲月日之徴徴在王與卿士師尹有以致之星之徴徴不在民有以致之而視在上有以從其欲也此為有異亦可見聖人為政只厚責於在上之人而不徙責之於民此所以相戒兢業而不敢有一毫之或肆也天有黃赤二道日月有九道周天有三百六十五度餘皆是後人推步之法作名以加之耳非實有也沈存中之説最善五福者謂使天下之人皆臻五福而不至於六極也使天下之人皆臻五福此為治之極功故以居九疇之終焉皇極五福即此五福但彼因皇極言之重在皇極之建此則専言之重在五福之全五福全則皇極在其中矣聖人之言自是混融無迹不似後世比對擺布牽繫纒綿功夫益多義理益晦今因皇極有五福遂生許多説話不知九疇雖有施為次第而道理自相通豈一件既畢方又起一件在彼無與於此在此不宜有與於彼耶先儒又以五福六極次第不相配如富應配貧凶應配考終命之類皆是太拘旅􅋙旅􅋙之書先儒皆以為既克商之後王心亦有少懈故召公此訓若嚴父師之訓子弟又云如教小兒相似此論固好然詳味召公之言亦只是平實道理何嘗有過為激切之論耶大抵古人言語皆是事實自當照依道理説去非有加也但不知當時武王受􅋙之意若何武王聖人豈有懈怠之心不以為當受而受之於此自有道理而召公大賢只守規矩遂以􅋙為無用之物不宜受而極言之蓋召公賢者自不能識聖人之作用也然召公之言自足為後世法故夫子録之後世之人自當守召公之經為正不宜妄擬聖人之作用而貽害無極也畢獻方物惟服食器用此是召公主意古之王者無非事者故所貢之物皆惟切於民用若獒則是不切於民用所謂不足以利器用則君不舉焉而武王受之召公遂驚駭似有狎侮之意似有役耳目之意似有玩人玩物之意故於下歷言之人不易物惟德其物此極是挈緊之言蓋不以物觀物而以德觀物則覩是物者思其德而皆務於修德矣不以德觀物而以物觀物則覩是物者愛其物而皆競於玩物矣此實天理人欲之分成敗之幾皆決於此孟子謂先生以義説秦楚之王秦楚之王説於義以利説則説於利一字之間而治亂興喪由之聖賢致謹於幾微之間每如此尚書疑義卷四
